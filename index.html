<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Huqqa Lounge | Премиум лаунж</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0c;
            color: #ffffff;
            padding-bottom: 70px;
            transition: background 0.3s, color 0.3s;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');

        /* Дымчатый градиентный фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(30, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.95) 100%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            padding-top: env(safe-area-inset-top, 20px);
        }

        /* Tab Bar — тёмный стеклянный с красным акцентом */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(8, 8, 10, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 10px 16px calc(10px + env(safe-area-inset-bottom, 0px));
            border-top: 1px solid rgba(220, 40, 40, 0.3);
            z-index: 1000;
        }

        .tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.45);
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 24px;
            transition: all 0.25s ease;
        }

        .tab .tab-icon {
            font-size: 22px;
            transition: transform 0.2s ease;
        }

        .tab:hover .tab-icon {
            transform: translateY(-2px);
        }

        .tab.active {
            color: #e84545;
            background: rgba(232, 69, 69, 0.12);
            box-shadow: 0 0 15px rgba(232, 69, 69, 0.1);
        }

        .tab.active .tab-icon {
            transform: scale(1.05);
        }

        /* Карточки — дымчатые с красной окантовкой */
        .card, .menu-item, .promo-card, .booking-item, .admin-booking, .booking-card {
            background: linear-gradient(135deg, rgba(18, 18, 22, 0.95) 0%, rgba(12, 12, 16, 0.98) 100%);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(232, 69, 69, 0.25);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .card:hover, .menu-item:hover, .promo-card:hover {
            transform: translateY(-3px);
            border-color: rgba(232, 69, 69, 0.6);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(232, 69, 69, 0.15);
        }

        /* Поля ввода — угольно-чёрные */
        input, select, textarea {
            font-size: 16px;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1.5px solid rgba(232, 69, 69, 0.2);
            background: rgba(5, 5, 7, 0.9);
            color: #ffffff;
            width: 100%;
            margin-bottom: 14px;
            box-sizing: border-box;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #e84545;
            box-shadow: 0 0 0 3px rgba(232, 69, 69, 0.2);
            background: rgba(8, 8, 12, 0.95);
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        /* Кнопки — красный градиент */
        button {
            background: linear-gradient(135deg, #e84545 0%, #c92a2a 100%);
            color: #ffffff;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            padding: 14px 20px;
            border-radius: 16px;
            width: 100%;
            margin-bottom: 12px;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }

        button:hover {
            transform: scale(0.98);
            box-shadow: 0 8px 24px rgba(232, 69, 69, 0.35);
            background: linear-gradient(135deg, #f05555 0%, #d43535 100%);
        }

        .confirm-btn {
            background: linear-gradient(135deg, #2d8a4e, #1e6b3b);
            width: auto;
            padding: 8px 18px;
            margin-right: 8px;
        }

        .cancel-btn {
            background: linear-gradient(135deg, #dc3545, #a71d2a);
            width: auto;
            padding: 8px 18px;
        }

        .edit-btn {
            background: linear-gradient(135deg, #2d6a9f, #1e4d73);
            width: auto;
            padding: 8px 18px;
            margin-right: 8px;
        }

        .broadcast-btn {
            background: linear-gradient(135deg, #8b2c9d, #6b1f7a);
            width: auto;
            padding: 10px 20px;
            margin-bottom: 0;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #3a3a45, #2a2a32);
            color: #fff;
            width: auto;
            padding: 10px 20px;
            margin-bottom: 0;
        }

        /* Бонусный баланс — красный неон */
        .bonus-balance {
            font-size: 56px;
            font-weight: 800;
            text-align: center;
            margin: 20px 0;
            background: linear-gradient(135deg, #ff6b6b, #e84545, #c92a2a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(232, 69, 69, 0.4);
        }

        /* Заголовки с красным акцентом */
        .restaurant-header h1 {
            font-size: 34px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #e84545);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        h2 {
            font-size: 22px;
            font-weight: 600;
            margin: 20px 0 16px 0;
            letter-spacing: -0.3px;
            border-left: 3px solid #e84545;
            padding-left: 12px;
        }

        h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #e84545;
        }

        /* Категории меню */
        .menu-category {
            font-size: 20px;
            font-weight: 700;
            margin: 24px 0 14px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid rgba(232, 69, 69, 0.5);
            letter-spacing: -0.3px;
        }

        .menu-subcategory {
            font-size: 15px;
            font-weight: 600;
            margin: 16px 0 10px 0;
            color: rgba(232, 69, 69, 0.8);
            letter-spacing: -0.2px;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding: 12px 16px;
        }

        .menu-item strong {
            font-size: 15px;
            font-weight: 500;
        }

        .menu-item span {
            font-weight: 600;
            color: #e84545;
            background: rgba(232, 69, 69, 0.12);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
        }

        /* Статусы */
        .status-pending {
            color: #e84545;
            font-weight: 600;
            background: rgba(232, 69, 69, 0.15);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            font-size: 12px;
        }

        .status-confirmed {
            color: #2d8a4e;
            font-weight: 600;
            background: rgba(45, 138, 78, 0.15);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            font-size: 12px;
        }

        /* Toast уведомления */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            color: #e84545;
            padding: 14px 20px;
            border-radius: 60px;
            text-align: center;
            z-index: 2000;
            animation: fadeInOut 2.5s ease;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(232, 69, 69, 0.4);
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        /* Модальное окно */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .modal-content {
            background: linear-gradient(135deg, #121215, #0a0a0d);
            border-radius: 32px;
            padding: 28px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(232, 69, 69, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .modal-content h3 {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Админ панель */
        .admin-panel {
            background: linear-gradient(135deg, #e84545, #c92a2a);
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 12px;
        }

        .delete-mode-indicator {
            background: rgba(232, 69, 69, 0.1);
            border: 1px solid rgba(232, 69, 69, 0.3);
            padding: 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
        }

        label {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.3px;
        }

        #shareContactBtn {
            background: linear-gradient(135deg, #2a2a32, #1a1a22);
            color: #fff;
        }

        .copyPromoBtn {
            background: rgba(232, 69, 69, 0.12);
            color: #e84545;
            border: 1px solid rgba(232, 69, 69, 0.3);
            margin-top: 10px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: rgba(232, 69, 69, 0.6);
            font-size: 14px;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0f0f12;
        }
        ::-webkit-scrollbar-thumb {
            background: #e84545;
            border-radius: 10px;
        }

        /* Дымчатый эффект для фона */
        .smoke-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 30% 40%, rgba(232, 69, 69, 0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="smoke-overlay"></div>
    <div class="container" id="app">
        <div class="loading">⟡ ЗАГРУЗКА ПРЕМИУМ ОПЫТА ⟡</div>
    </div>

    <div class="tab-bar">
        <button class="tab" data-tab="booking">📅<span>СТОЛ</span></button>
        <button class="tab" data-tab="menu">📖<span>МЕНЮ</span></button>
        <button class="tab" data-tab="bonus">🎁<span>КАРТА</span></button>
        <button class="tab" data-tab="promo">🔥<span>АКЦИИ</span></button>
        <button class="tab" data-tab="contacts">📞<span>КОНТАКТЫ</span></button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // ==================== НАСТРОЙКИ ====================
        const SHEET_API = "https://api.sheetbest.com/sheets/86b2770d-6921-43a6-ada0-a16dbd1ce54c";
        const USERS_API = "https://api.sheetbest.com/sheets/912a1d92-a006-4a4c-9085-7d6f3722e453";
        const ADMIN_IDS = [755574601];
        const BOT_TOKEN = "8696170529:AAGtVDCEntgnKdvgaEdQ44DZnnBORHjAyNM";
        // ===================================================
        
        let tg = window.Telegram?.WebApp;
        if (!tg || !tg.initDataUnsafe?.user?.id) {
            tg = {
                initDataUnsafe: { user: { id: 755574601, first_name: "Admin", username: "admin" } },
                ready: () => {},
                expand: () => {},
                close: () => {},
                HapticFeedback: { impactOccurred: () => {} },
                themeParams: { bg_color: "#0a0a0c", text_color: "#ffffff", button_color: "#e84545" }
            };
        }
        
        tg.expand();
        tg.ready();
        document.body.style.background = '#0a0a0c';
        
        const TELEGRAM_USER_ID = tg.initDataUnsafe.user.id;
        const TELEGRAM_USER_NAME = tg.initDataUnsafe.user.first_name || "Гость";
        const IS_ADMIN = ADMIN_IDS.includes(TELEGRAM_USER_ID);
        
        // ========== Регистрация ==========
        let userPhone = null;
        let isRegistered = false;
        
        function loadUserData() {
            const saved = localStorage.getItem(`huqqa_user_${TELEGRAM_USER_ID}`);
            if (saved) {
                const data = JSON.parse(saved);
                userPhone = data.phone;
                isRegistered = !!userPhone;
            }
        }
        
        async function saveUserDataToCloud(phone) {
            try {
                const response = await fetch(USERS_API);
                const users = await response.json();
                const existing = users.find(u => String(u.userId) === String(TELEGRAM_USER_ID));
                
                if (!existing) {
                    const newUser = {
                        id: Date.now().toString(),
                        userId: String(TELEGRAM_USER_ID),
                        name: TELEGRAM_USER_NAME,
                        phone: phone,
                        registeredAt: new Date().toISOString()
                    };
                    await fetch(USERS_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify([newUser])
                    });
                    
                    // +300 бонусов за регистрацию
                    addBonus("⟡ Регистрация в Huqqa Lounge ⟡", 300);
                    showToast("⟡ +300 бонусов за регистрацию! ⟡");
                    
                } else if (existing.phone !== phone) {
                    await fetch(`${USERS_API}/id/${existing.id}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: phone })
                    });
                }
                
                userPhone = phone;
                isRegistered = true;
                localStorage.setItem(`huqqa_user_${TELEGRAM_USER_ID}`, JSON.stringify({
                    phone: phone,
                    registeredAt: new Date().toISOString()
                }));
                
                return true;
            } catch (error) {
                console.error("Ошибка:", error);
                return false;
            }
        }
        
        async function getBroadcastUsers() {
            try {
                const response = await fetch(USERS_API);
                return await response.json();
            } catch (error) {
                return [];
            }
        }
        
        // ========== АВТОУДАЛЕНИЕ ПРОСРОЧЕННЫХ БРОНЕЙ ==========
        function isBookingExpired(booking) {
            if (!booking.date || !booking.time) return false;
            const bookingDateTime = new Date(`${booking.date}T${booking.time}`);
            const now = new Date();
            const hoursDiff = (now - bookingDateTime) / (1000 * 60 * 60);
            return hoursDiff > 24;
        }
        
        async function deleteExpiredBookings() {
            try {
                const response = await fetch(SHEET_API);
                const allBookings = await response.json();
                let deletedCount = 0;
                for (const booking of allBookings) {
                    if (isBookingExpired(booking)) {
                        await fetch(`${SHEET_API}/id/${booking.id}`, { method: 'DELETE' });
                        deletedCount++;
                    }
                }
                return deletedCount;
            } catch (error) {
                return 0;
            }
        }
        
        // ========== ОТПРАВКА УВЕДОМЛЕНИЯ АДМИНИСТРАТОРУ ==========
        async function sendNotificationToAdmins(booking) {
            const adminIds = ADMIN_IDS;
            const message = `🆕 *НОВАЯ БРОНЬ В HUQQA LOUNGE!*\n\n` +
                `👤 *Имя:* ${booking.name}\n` +
                `📞 *Телефон:* ${booking.phone}\n` +
                `📅 *Дата:* ${booking.date}\n` +
                `⏰ *Время:* ${booking.time}\n` +
                `👥 *Гостей:* ${booking.guests}\n` +
                `🆔 *TG ID:* ${booking.userId}\n\n` +
                `_Для подтверждения зайдите в админ-панель_`;
            
            let successCount = 0;
            for (const adminId of adminIds) {
                try {
                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: adminId,
                            text: message,
                            parse_mode: 'Markdown'
                        })
                    });
                    if (response.ok) successCount++;
                } catch (error) {
                    console.error("Ошибка отправки уведомления админу:", error);
                }
            }
            return successCount;
        }
        
        // ========== РЕДАКТИРОВАНИЕ БРОНИ ==========
        function showEditBookingModal(booking) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>✏️ РЕДАКТИРОВАТЬ БРОНЬ</h3>
                    <div class="edit-input">
                        <label>👤 Имя</label>
                        <input type="text" id="editName" value="${booking.name || ''}">
                    </div>
                    <div class="edit-input">
                        <label>📞 Телефон</label>
                        <input type="tel" id="editPhone" value="${booking.phone || ''}">
                    </div>
                    <div class="edit-input">
                        <label>📅 Дата</label>
                        <input type="date" id="editDate" value="${booking.date || ''}" min="${new Date().toISOString().split('T')[0]}">
                    </div>
                    <div class="edit-input">
                        <label>⏰ Время</label>
                        <input type="time" id="editTime" value="${booking.time || ''}">
                    </div>
                    <div class="edit-input">
                        <label>👥 Количество гостей</label>
                        <input type="number" id="editGuests" value="${booking.guests || 2}" min="1" max="20">
                    </div>
                    <div class="edit-input">
                        <label>📊 Статус</label>
                        <select id="editStatus">
                            <option value="pending" ${booking.status === 'pending' ? 'selected' : ''}>⏳ Ожидает</option>
                            <option value="confirmed" ${booking.status === 'confirmed' ? 'selected' : ''}>✅ Подтверждено</option>
                        </select>
                    </div>
                    <div class="button-group">
                        <button id="saveEditBtn" style="background: linear-gradient(135deg, #2d8a4e, #1e6b3b);">💾 СОХРАНИТЬ</button>
                        <button id="closeEditBtn" style="background: linear-gradient(135deg, #3a3a45, #2a2a32);">ОТМЕНА</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('saveEditBtn')?.addEventListener('click', async () => {
                const updatedBooking = {
                    ...booking,
                    name: document.getElementById('editName').value,
                    phone: document.getElementById('editPhone').value,
                    date: document.getElementById('editDate').value,
                    time: document.getElementById('editTime').value,
                    guests: parseInt(document.getElementById('editGuests').value),
                    status: document.getElementById('editStatus').value
                };
                
                if (!updatedBooking.phone || !updatedBooking.date || !updatedBooking.time) {
                    showToast("Заполните все поля", true);
                    return;
                }
                
                await updateBooking(booking.id, updatedBooking);
                showToast(`✅ Бронь обновлена!`);
                modal.remove();
                renderAdminPanel();
            });
            
            document.getElementById('closeEditBtn')?.addEventListener('click', () => {
                modal.remove();
            });
        }
        
        // ========== РАССЫЛКА ==========
        async function sendPhotoMessage(chatId, caption, imageFile) {
            try {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', imageFile);
                formData.append('caption', `⟡ *НОВОСТЬ HUQQA LOUNGE* ⟡\n\n${caption}\n\n— Администрация Huqqa Lounge`);
                formData.append('parse_mode', 'Markdown');
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                return response.ok;
            } catch (error) {
                return false;
            }
        }
        
        async function sendTextMessage(chatId, text) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: `⟡ *НОВОСТЬ HUQQA LOUNGE* ⟡\n\n${text}\n\n— Администрация Huqqa Lounge`,
                        parse_mode: 'Markdown'
                    })
                });
                return response.ok;
            } catch (error) {
                return false;
            }
        }
        
        async function sendBroadcast(message, imageFile = null) {
            const users = await getBroadcastUsers();
            if (users.length === 0) {
                showToast("❌ Нет зарегистрированных пользователей", true);
                return { success: false, count: 0 };
            }
            let successCount = 0;
            let failCount = 0;
            showToast(`📢 Начинаю рассылку ${users.length} пользователям...`);
            for (const user of users) {
                let sent = false;
                if (imageFile) {
                    sent = await sendPhotoMessage(user.userId, message, imageFile);
                } else {
                    sent = await sendTextMessage(user.userId, message);
                }
                if (sent) successCount++;
                else failCount++;
                await new Promise(resolve => setTimeout(resolve, 100));

        async function loadBookings() {
            try {
                const response = await fetch(SHEET_API);
                if (!response.ok) throw new Error('Ошибка загрузки');
                const data = await response.json();
                bookings = data;
                return bookings;
            } catch (error) {
                bookings = [];
                return [];
            }
        }
        
        async function saveBooking(booking) {
            try {
                booking.id = Date.now().toString();
                booking.created_at = new Date().toISOString();
                booking.phone = userPhone || booking.phone;
                const response = await fetch(SHEET_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify([booking])
                });
                if (!response.ok) throw new Error('Ошибка сохранения');
                return booking;
            } catch (error) {
                showToast("Ошибка сохранения!", true);
                return null;
            }
        }
        
        async function updateBooking(bookingId, updatedData) {
            try {
                const response = await fetch(`${SHEET_API}/id/${bookingId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                });
                if (!response.ok) throw new Error('Ошибка обновления');
                return true;
            } catch (error) {
                showToast("Ошибка обновления!", true);
                return false;
            }
        }

                    method: 'DELETE'

            } catch (error) {

                html += `<div class="menu-item"><strong>${item.name}</strong> <span>${item.price} ₽</span></div>`;
            });
            
            html += `<div class="menu-category">🥄 ДОБАВКИ</div>`;
            menuItems.filter(i => i.category === "Добавки").forEach(item => {
                html += `<div class="menu-item"><strong>${item.name}</strong> <span>${item.price} ₽</span></div>`;
            });
            
            html += `<div class="menu-category">🍾 ПРОБКОВЫЙ СБОР</div>`;
            html += `<div class="card"><small style="opacity:0.6;">📌 Цены указаны за 1 бутылку</small></div>`;
            menuItems.filter(i => i.category === "Пробковый сбор").forEach(item => {
                html += `<div class="menu-item"><strong>${item.name}</strong> <span>${item.price} ₽</span></div>`;
            });
            
            document.getElementById('app').innerHTML = html;
        }
        
        // ========== Моя карта ==========
        function renderBonus() {
            const bookingsCount = bookings.filter(b => String(b.userId) === String(TELEGRAM_USER_ID) && !isBookingExpired(b)).length;
            const html = `
                <h2>🎁 МОЯ КАРТА ГОСТЯ</h2>
                <div class="card">
                    <h3>💰 БОНУСНЫЙ БАЛАНС</h3>
                    <div class="bonus-balance">${userBonuses.balance}</div>
                    <p style="opacity:0.7;">100 бонусов = 50₽ скидка</p>
                </div>
                <div class="card">
                    <h3>📊 СТАТИСТИКА</h3>
                    <p>📌 Активных броней: ${bookingsCount}</p>
                    <p>🎫 +300 бонусов за регистрацию</p>
                </div>
                <div class="card">
                    <h3>📜 ИСТОРИЯ ОПЕРАЦИЙ</h3>
                    ${userBonuses.history.length === 0 ? '<p style="opacity:0.5;">Пока нет операций</p>' : 
                        userBonuses.history.map(h => `<div style="border-bottom:1px solid rgba(232,69,69,0.2); padding:8px 0;">${h.date} — +${h.amount} (${h.reason})</div>`).join('')}
                </div>
            `;
            document.getElementById('app').innerHTML = html;
        }
        
        // ========== Акции ==========
        function renderPromo() {
            const html = `
                <h2>🔥 АКЦИИ И СКИДКИ</h2>
                ${promos.map(p => `
                    <div class="promo-card">
                        <strong style="color:#e84545;">${p.name}</strong> ${p.discount > 0 ? `— скидка ${p.discount}%` : ''}<br>
                        ${p.desc}<br>
                        <button class="copyPromoBtn" data-code="${p.code}">📋 СКОПИРОВАТЬ КОД: ${p.code}</button>
                    </div>
                `).join('')}
                <div class="card">
                    <h3>💡 КАК ИСПОЛЬЗОВАТЬ?</h3>
                    <p style="opacity:0.7;">Скопируй промокод и назови его официанту при заказе.</p>
                </div>
            `;
            document.getElementById('app').innerHTML = html;
            document.querySelectorAll('.copyPromoBtn').forEach(btn => {
                btn.addEventListener('click', () => {
                    navigator.clipboard.writeText(btn.dataset.code);
                    showToast(`✅ Промокод скопирован`);
                });
            });
        }
        
        // ========== Контакты ==========
        function renderContacts() {
            const html = `
                <h2>📞 КОНТАКТЫ</h2>
                <div class="card">
                    <p>📍 ул. Молодежная 15Б, г. Химки</p>
                    <p>📞 <a href="tel:+79099846677" style="color:#e84545; text-decoration:none;">+7 (909) 984-66-77</a></p>
                    <p>🕒 Вс-Чт: 12:00 – 02:00</p>
                    <p>🕒 Пт-Сб: 12:00 – 03:00</p>
                    <button id="shareContactBtn">📱 ПОДЕЛИТЬСЯ НОМЕРОМ</button>
                </div>
                <iframe width="100%" height="250" frameborder="0" style="border-radius:24px; border:1px solid rgba(232,69,69,0.3);" 
                    src="https://yandex.ru/map-widget/v1/?ll=37.4450,55.8890&z=17&pt=37.4450,55.8890,pm2rdm&what=here&text=Молодежная%2015Б%20Химки"></iframe>
            `;
            document.getElementById('app').innerHTML = html;
            document.getElementById('shareContactBtn')?.addEventListener('click', () => showToast(`Номер передан ресторану`));
        }
        
        let currentTab = "booking";
        
        async function renderCurrentTab() {
            if (!isRegistered) {
                await showPhoneRegistrationModal();
                renderCurrentTab();
                return;
            }
            if (currentTab === 'admin' && IS_ADMIN) await renderAdminPanel();
            else if (currentTab === 'booking') await renderBooking();
            else if (currentTab === 'menu') renderMenu();
            else if (currentTab === 'bonus') renderBonus();
            else if (currentTab === 'promo') renderPromo();
            else if (currentTab === 'contacts') renderContacts();
            else await renderBooking();
        }
        
        function showPhoneRegistrationModal() {
            return new Promise((resolve) => {
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3>⟡ HUQQA LOUNGE ⟡</h3>
                        <p style="text-align:center; margin-bottom:16px;">Укажите ваш номер телефона для бронирования</p>
                        <p style="text-align:center; margin-bottom:12px; color:#e84545; font-weight:600;">🎁 +300 БОНУСОВ ЗА РЕГИСТРАЦИЮ!</p>
                        <input type="tel" id="phoneInput" placeholder="+7 (XXX) XXX-XX-XX">
                        <div class="button-group">
                            <button id="savePhoneBtn">⟡ ПРОДОЛЖИТЬ ⟡</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                document.getElementById('savePhoneBtn')?.addEventListener('click', async () => {
                    const phone = document.getElementById('phoneInput').value.trim();
                    if (phone) {
                        await saveUserDataToCloud(phone);
                        modal.remove();
                        resolve(true);
                    } else {
                        showToast("Введите номер телефона", true);
                    }
                });
            });
        }
        
        function setupTabs() {
            const tabBar = document.querySelector('.tab-bar');
            if (IS_ADMIN && !document.querySelector('.tab[data-tab="admin"]')) {
                const adminTab = document.createElement('button');
                adminTab.className = 'tab';
                adminTab.setAttribute('data-tab', 'admin');
                adminTab.innerHTML = '👑<span>АДМИН</span>';
                tabBar.appendChild(adminTab);
            }
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    currentTab = tab.dataset.tab;
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    renderCurrentTab();
                });
            });
        }
        
        loadUserData();
        loadBonuses();
        setupTabs();
        document.querySelector('.tab').classList.add('active');
        renderCurrentTab();
        
        setInterval(async () => {
            if (IS_ADMIN && currentTab === 'admin') {
                const deleted = await deleteExpiredBookings();
                if (deleted > 0) renderAdminPanel();
            }
        }, 5 * 60 * 1000);
        
        console.log("👤 User ID:", TELEGRAM_USER_ID);
        console.log("👑 Is Admin:", IS_ADMIN);
    </script>
</body>
</html>
