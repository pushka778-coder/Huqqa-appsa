<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Huqqa Lounge | Премиум лаунж</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0c;
            color: #ffffff;
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(30, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.95) 100%);
            pointer-events: none;
            z-index: -1;
        }
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 20px; 
            padding-bottom: 90px;
            padding-top: env(safe-area-inset-top, 20px);
        }
        
        /* Горизонтальный скролл для нижней панели */
        .tab-bar-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(8, 8, 10, 0.96);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(220, 40, 40, 0.4);
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom, 10px);
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: #e84545 #2a2a2a;
        }
        .tab-bar-wrapper::-webkit-scrollbar {
            height: 3px;
        }
        .tab-bar-wrapper::-webkit-scrollbar-track {
            background: #2a2a2a;
            border-radius: 10px;
        }
        .tab-bar-wrapper::-webkit-scrollbar-thumb {
            background: #e84545;
            border-radius: 10px;
        }
        .tab-bar {
            display: inline-flex;
            justify-content: flex-start;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            white-space: nowrap;
        }
        
        .tab {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 40px;
            transition: all 0.2s ease;
            font-family: inherit;
            backdrop-filter: blur(4px);
        }
        .tab.active { 
            color: #e84545; 
            background: rgba(232, 69, 69, 0.15);
            box-shadow: 0 0 4px rgba(232, 69, 69, 0.3);
        }
        .tab span {
            font-size: 10px;
            letter-spacing: 0.3px;
        }
        .tab .emoji-big {
            font-size: 22px;
        }
        
        .card, .menu-item, .promo-card, .booking-card {
            background: linear-gradient(135deg, rgba(18, 18, 22, 0.95) 0%, rgba(12, 12, 16, 0.98) 100%);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(232, 69, 69, 0.25);
            transition: all 0.3s ease;
        }
        .menu-category {
            font-size: 20px;
            font-weight: 700;
            margin: 16px 0 12px 0;
            color: #e84545;
            border-left: 3px solid #e84545;
            padding-left: 12px;
        }
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 8px;
        }
        input, select, textarea {
            font-size: 16px;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1.5px solid rgba(232, 69, 69, 0.2);
            background: rgba(5, 5, 7, 0.9);
            color: #ffffff;
            width: 100%;
            margin-bottom: 14px;
        }
        input:focus, textarea:focus { outline: none; border-color: #e84545; box-shadow: 0 0 0 3px rgba(232, 69, 69, 0.2); }
        button {
            background: linear-gradient(135deg, #e84545 0%, #c92a2a 100%);
            color: #ffffff;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            padding: 14px 20px;
            border-radius: 16px;
            width: 100%;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }
        .btn-secondary { background: linear-gradient(135deg, #3a3a45, #2a2a32); margin-bottom: 0; width: auto; padding: 10px 20px; }
        .btn-success { background: linear-gradient(135deg, #28a745, #1e6b3b); }
        .button-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }
        .restaurant-header h1 { font-size: 34px; font-weight: 800; background: linear-gradient(135deg, #ffffff, #e84545); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; }
        h2 { font-size: 22px; font-weight: 600; margin: 20px 0 16px 0; border-left: 3px solid #e84545; padding-left: 12px; }
        h3 { font-size: 18px; font-weight: 600; margin-bottom: 12px; color: #e84545; }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            color: #e84545;
            padding: 14px 20px;
            border-radius: 60px;
            text-align: center;
            z-index: 2000;
            animation: fadeInOut 2.5s ease;
            border: 1px solid rgba(232, 69, 69, 0.4);
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.94);
            backdrop-filter: blur(18px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal-content {
            background: linear-gradient(135deg, #121215, #0a0a0d);
            border-radius: 32px;
            padding: 28px;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(232, 69, 69, 0.4);
        }
        .bonus-balance { font-size: 48px; font-weight: 800; text-align: center; color: #e84545; margin: 10px 0; }
        .status-pending { color: #f0ad4e; background: rgba(240, 173, 78, 0.2); padding: 4px 10px; border-radius: 30px; font-size: 12px; display: inline-block; }
        .status-confirmed { color: #5cb85c; background: rgba(92, 184, 92, 0.2); padding: 4px 10px; border-radius: 30px; font-size: 12px; display: inline-block; }
        .card-info { text-align: center; margin-top: 10px; font-size: 12px; color: rgba(255,255,255,0.5); }
        .history-item { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .history-date { font-size: 12px; color: rgba(255,255,255,0.5); }
        .history-amount { color: #e84545; font-weight: 600; }
        .loading { text-align: center; padding: 60px; color: rgba(232, 69, 69, 0.6); }
        .info-text { color: rgba(255,255,255,0.6); font-size: 14px; text-align: center; margin-top: 10px; }
        
        @media (max-width: 480px) {
            .tab { padding: 6px 12px; }
            .tab .emoji-big { font-size: 20px; }
            .tab span { font-size: 9px; }
        }
    </style>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <div class="container" id="app">
        <div class="loading">⟡ ЗАГРУЗКА ПРЕМИУМ ОПЫТА ⟡</div>
    </div>

    <div class="tab-bar-wrapper">
        <div class="tab-bar" id="tabBar">
            <button class="tab" data-tab="booking">📅<span>СТОЛ</span></button>
            <button class="tab" data-tab="menu">📖<span>МЕНЮ</span></button>
            <button class="tab" data-tab="call">🔔<span>ВЫЗОВ</span></button>
            <button class="tab" data-tab="bonus">🎁<span>КАРТА</span></button>
            <button class="tab" data-tab="promo">🔥<span>АКЦИИ</span></button>
            <button class="tab" data-tab="contacts">📞<span>КОНТАКТЫ</span></button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // ==================== НАСТРОЙКИ ====================
        const SHEET_API = "https://api.sheetbest.com/sheets/86b2770d-6921-43a6-ada0-a16dbd1ce54c";
        const USERS_API = "https://api.sheetbest.com/sheets/912a1d92-a006-4a4c-9085-7d6f3722e453";
        const ADMIN_IDS = [755574601];
        const BOT_TOKEN = "8696170529:AAGtVDCEntgnKdvgaEdQ44DZnnBORHjAyNM";
        const STAFF_CHAT_ID = "-1003809247932";
        
        // ========== НАСТРОЙКИ FRONTPAD API ==========
        const FRONTPAD_SECRET = "AaQQTaGdtZzarNtd8DtDQBdA43T4d7tE77eQ8NTrAdsQSKSQaaeRBhds8ZfaSBEQzKstk9HKd4nYB7zB7DeyKhQH6YKNidnHQF44FBDHrSsSNReGfk5TyFrrr35D5f9GN4Afr3RGF8keQtQYFGD4aSfsG9TAeS6TGs32fFyQEGYe4z3z6sk69tkFt65AN2ehe78nDs463K9R83b4fnZeH8K45ErEszQAtKNY4EQRdQyaEz5KNRRiNrbFYs"; // ЗАМЕНИТЕ НА ВАШ РЕАЛЬНЫЙ КЛЮЧ!
        // ===================================================
        
        let tg = window.Telegram?.WebApp;
        if (!tg || !tg.initDataUnsafe?.user?.id) {
            tg = {
                initDataUnsafe: { user: { id: 755574601, first_name: "Admin", username: "admin" } },
                ready: () => {},
                expand: () => {},
                close: () => {},
                HapticFeedback: { impactOccurred: () => {} }
            };
        }
        
        tg.expand();
        tg.ready();
        
        const TELEGRAM_USER_ID = tg.initDataUnsafe.user.id;
        const TELEGRAM_USER_NAME = tg.initDataUnsafe.user.first_name || "Гость";
        const IS_ADMIN = ADMIN_IDS.includes(TELEGRAM_USER_ID);
        
        // ========== FrontPad API ФУНКЦИЯ ==========
        async function getFrontpadScore(phone) {
            if (!phone) return null;
            
            // Очищаем номер телефона
            let cleanPhone = phone.replace(/\D/g, '');
            
            // Приводим к формату 7XXXXXXXXXX
            if (cleanPhone.startsWith('8')) {
                cleanPhone = '7' + cleanPhone.substring(1);
            } else if (cleanPhone.startsWith('9') && cleanPhone.length === 10) {
                cleanPhone = '7' + cleanPhone;
            } else if (cleanPhone.startsWith('+7')) {
                cleanPhone = '7' + cleanPhone.substring(2);
            }
            
            if (cleanPhone.length !== 11 || !cleanPhone.startsWith('7')) {
                console.warn('Неверный формат номера:', cleanPhone);
                return null;
            }
            
            try {
                const url = "https://app.frontpad.ru/api/index.php?get_client";
                const formData = new URLSearchParams();
                formData.append('secret', FRONTPAD_SECRET);
                formData.append('client_phone', cleanPhone);
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                
                const result = await response.json();
                console.log('FrontPad ответ:', result);
                
                if (result.result === 'success') {
                    return {
                        score: parseInt(result.score) || 0,
                        name: result.name || null,
                        card: result.card || null,
                        sale: result.sale || null
                    };
                } else {
                    console.warn('FrontPad ошибка:', result.error);
                    return null;
                }
            } catch (error) {
                console.error('Ошибка запроса к FrontPad:', error);
                return null;
            }
        }
        
        // ========== Данные пользователя ==========
        let userPhone = null;
        let userBirthday = null;
        let isRegistered = false;
        let frontpadData = null;
        
        function loadUserData() {
            const saved = localStorage.getItem(`huqqa_user_${TELEGRAM_USER_ID}`);
            if (saved) {
                const data = JSON.parse(saved);
                userPhone = data.phone;
                userBirthday = data.birthday;
                isRegistered = !!userPhone;
            }
        }
        
        async function saveUserDataToCloud(phone, birthday) {
            try {
                const response = await fetch(USERS_API);
                const users = await response.json();
                const existing = users.find(u => String(u.userId) === String(TELEGRAM_USER_ID));
                
                if (!existing) {
                    const newUser = {
                        id: Date.now().toString(),
                        userId: String(TELEGRAM_USER_ID),
                        name: TELEGRAM_USER_NAME,
                        phone: phone,
                        birthday: birthday,
                        registeredAt: new Date().toISOString()
                    };
                    await fetch(USERS_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify([newUser])
                    });
                    addBonus("Регистрация в Huqqa Lounge", 300);
                    showToast("✨ +300 бонусов за регистрацию!");
                }
                
                userPhone = phone;
                userBirthday = birthday;
                isRegistered = true;
                localStorage.setItem(`huqqa_user_${TELEGRAM_USER_ID}`, JSON.stringify({
                    phone: phone,
                    birthday: birthday
                }));
                
                // Синхронизируем бонусы с FrontPad после регистрации
                await syncBonusesWithFrontpad();
                
                return true;
            } catch (error) {
                console.error("Ошибка:", error);
                return false;
            }
        }
        
        // ========== Синхронизация с FrontPad ==========
        async function syncBonusesWithFrontpad() {
            if (!userPhone) {
                console.log('Нет номера телефона для синхронизации');
                return null;
            }
            
            console.log('Синхронизация с FrontPad для номера:', userPhone);
            
            const fpData = await getFrontpadScore(userPhone);
            if (fpData && fpData.score !== null) {
                frontpadData = fpData;
                if (userBonuses.balance !== fpData.score) {
                    userBonuses.balance = fpData.score;
                    userBonuses.history.unshift({
                        date: new Date().toLocaleString(),
                        reason: "Синхронизация с FrontPad",
                        amount: fpData.score
                    });
                    if (userBonuses.history.length > 20) userBonuses.history.pop();
                    saveBonuses();
                    showToast(`🔄 Бонусы обновлены: ${fpData.score} баллов`);
                }
                return fpData;
            } else {
                console.log('Не удалось получить данные из FrontPad');
                return null;
            }
        }
        
        // ========== Бонусная система ==========
        let userBonuses = { balance: 0, history: [] };
        function loadBonuses() {
            const saved = localStorage.getItem(`huqqa_bonuses_${TELEGRAM_USER_ID}`);
            if (saved) userBonuses = JSON.parse(saved);
            else { userBonuses = { balance: 0, history: [] }; saveBonuses(); }
        }
        function saveBonuses() { localStorage.setItem(`huqqa_bonuses_${TELEGRAM_USER_ID}`, JSON.stringify(userBonuses)); }
        function addBonus(reason, amount) {
            userBonuses.balance += amount;
            userBonuses.history.unshift({ date: new Date().toLocaleString(), reason: reason, amount: amount });
            if (userBonuses.history.length > 20) userBonuses.history.pop();
            saveBonuses();
        }
        
        // ========== Бронирования ==========
        let bookings = [];
        async function loadBookings() {
            try {
                const response = await fetch(SHEET_API);
                bookings = await response.json();
                return bookings;
            } catch { bookings = []; return []; }
        }
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.style.background = isError ? 'rgba(30, 0, 0, 0.95)' : 'rgba(0, 0, 0, 0.95)';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        // ========== QR-сканер для вызова ==========
        let html5QrCode = null;
        
        async function startScanner() {
            const scannerContainer = document.createElement('div');
            scannerContainer.className = 'modal';
            scannerContainer.innerHTML = `
                <div class="modal-content" style="text-align: center;">
                    <h3>🔔 ВЫЗОВ КАЛЬЯНЩИКА</h3>
                    <p style="margin-bottom: 12px;">📷 Наведите камеру на QR-код стола</p>
                    <div id="qr-reader" style="width: 100%; margin: 0 auto;"></div>
                    <div class="button-group" style="margin-top: 20px;">
                        <button id="closeScannerBtn" class="btn-secondary">❌ ОТМЕНА</button>
                    </div>
                </div>
            `;
            document.body.appendChild(scannerContainer);
            
            html5QrCode = new Html5Qrcode("qr-reader");
            
            try {
                await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
                    html5QrCode.stop();
                    scannerContainer.remove();
                    
                    if (decodedText.startsWith("Huqqa-")) {
                        const tableNumber = decodedText.replace("Huqqa-", "");
                        if (tableNumber && !isNaN(parseInt(tableNumber))) {
                            showCallForm(tableNumber);
                        } else {
                            showToast("❌ Неверный формат QR-кода", true);
                        }
                    } else {
                        showToast("❌ Неверный QR-код", true);
                    }
                });
            } catch (err) {
                console.error(err);
                showToast("❌ Не удалось получить доступ к камере", true);
                scannerContainer.remove();
            }
            
            document.getElementById('closeScannerBtn')?.addEventListener('click', () => {
                if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop();
                scannerContainer.remove();
            });
        }
        
        function showCallForm(tableNumber) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>🔔 ВЫЗОВ КАЛЬЯНЩИКА</h3>
                    <label>🍽️ СТОЛ №${tableNumber}</label>
                    <label>💬 СООБЩЕНИЕ</label>
                    <textarea id="callMessage" rows="3" placeholder="Например: принесите уголь, поменяйте чашу..."></textarea>
                    <div class="button-group">
                        <button id="sendCallBtn" class="btn-success">📤 ОТПРАВИТЬ</button>
                        <button id="closeCallBtn" class="btn-secondary">ОТМЕНА</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('sendCallBtn').addEventListener('click', async () => {
                const message = document.getElementById('callMessage').value;
                const staffMessage = `🆘 *ВЫЗОВ КАЛЬЯНЩИКА*\n\n👤 *Гость:* ${TELEGRAM_USER_NAME}\n📞 *Телефон:* ${userPhone || "Не указан"}\n🍽️ *Стол:* ${tableNumber}\n💬 *Сообщение:* ${message || "—"}\n🕐 *Время:* ${new Date().toLocaleString()}`;
                
                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: STAFF_CHAT_ID, text: staffMessage, parse_mode: 'Markdown' })
                    });
                    showToast("✅ Вызов отправлен!");
                    modal.remove();
                } catch (error) {
                    showToast("❌ Ошибка отправки", true);
                }
            });
            
            document.getElementById('closeCallBtn').addEventListener('click', () => modal.remove());
        }
        
        // ========== Вкладки ==========
        async function renderCall() {
            const html = `
                <div class="restaurant-header">
                    <h1>🔔 ВЫЗОВ КАЛЬЯНЩИКА</h1>
                    <p>Отсканируйте QR-код на столе</p>
                </div>
                <div class="card" style="text-align: center;">
                    <div style="font-size: 64px; margin-bottom: 20px;">🔔</div>
                    <button id="scanQrBtn">📷 СКАНИРОВАТЬ QR-КОД</button>
                    <p class="info-text">QR-код должен быть в формате: Huqqa-XXX</p>
                </div>
            `;
            document.getElementById('app').innerHTML = html;
            document.getElementById('scanQrBtn').addEventListener('click', () => startScanner());
        }
        
        async function renderBooking() {
            await loadBookings();
            const myActiveBookings = bookings.filter(b => String(b.userId) === String(TELEGRAM_USER_ID));
            const html = `
                <div class="restaurant-header"><h1>⟡ HUQQA LOUNGE ⟡</h1><p>ЗАБРОНИРУЙТЕ СТОЛИК</p></div>
                <div class="card">
                    <input type="text" id="name" placeholder="Имя" value="${TELEGRAM_USER_NAME}">
                    <input type="tel" id="phone" placeholder="Телефон" value="${userPhone || ''}" ${userPhone ? 'readonly' : ''}>
                    <input type="date" id="date" min="${new Date().toISOString().split('T')[0]}">
                    <input type="time" id="time">
                    <input type="number" id="guests" placeholder="Кол-во гостей" min="1" max="10" value="2">
                    <button id="submitBookingBtn">ЗАБРОНИРОВАТЬ</button>
                </div>
                <h3>МОИ БРОНИ</h3>
                ${myActiveBookings.length === 0 ? '<p>Нет активных броней</p>' : myActiveBookings.map(b => `<div class="booking-card"><strong>${b.date} ${b.time}</strong><br>${b.guests} чел. | ${b.status === 'pending' ? '<span class="status-pending">ОЖИДАЕТ</span>' : '<span class="status-confirmed">ПОДТВЕРЖДЕНО</span>'}</div>`).join('')}
            `;
            document.getElementById('app').innerHTML = html;
            document.getElementById('submitBookingBtn')?.addEventListener('click', async () => {
                const newBooking = {
                    userId: String(TELEGRAM_USER_ID),
                    name: document.getElementById('name').value,
                    phone: document.getElementById('phone').value,
                    date: document.getElementById('date').value,
                    time: document.getElementById('time').value,
                    guests: parseInt(document.getElementById('guests').value),
                    status: 'pending',
                    id: Date.now().toString()
                };
                if (!newBooking.name || !newBooking.phone || !newBooking.date || !newBooking.time) {
                    showToast("Заполните все поля", true);
                    return;
                }
                await fetch(SHEET_API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify([newBooking]) });
                showToast("✅ Стол забронирован!");
                setTimeout(() => renderBooking(), 1000);
            });
        }
        
        function renderMenu() {
            const menuHtml = `
                <h2>📖 НАШЕ МЕНЮ</h2>
                <div class="menu-category">🔥 КАЛЬЯНЫ</div>
                <div class="menu-item"><strong>Бизнес кальян</strong><span>1500 ₽</span></div>
                <div class="menu-item"><strong>Классический кальян</strong><span>1700 ₽</span></div>
                <div class="menu-item"><strong>Премиум кальян</strong><span>1900 ₽</span></div>
                <div class="menu-item"><strong>Авторский кальян</strong><span>2500 ₽</span></div>
                <div class="menu-category">🍹 НАПИТКИ</div>
                <div class="menu-item"><strong>RedBull</strong><span>300 ₽</span></div>
                <div class="menu-item"><strong>Лимонад Star Bar</strong><span>350 ₽</span></div>
                <div class="menu-item"><strong>Пиво Корона</strong><span>400 ₽</span></div>
                <div class="menu-category">🍕 ЕДА</div>
                <div class="menu-item"><strong>СуперМясная пицца</strong><span>1000 ₽</span></div>
            `;
            document.getElementById('app').innerHTML = menuHtml;
        }
        
        async function renderBonus() {
            document.getElementById('app').innerHTML = '<div class="loading">🔄 Загрузка бонусов...</div>';
            
            // Синхронизируем с FrontPad при открытии вкладки
            await syncBonusesWithFrontpad();
            
            const balanceInRubles = (userBonuses.balance / 2).toFixed(0);
            const fpInfo = frontpadData ? `<div class="card-info">🎫 Карта: ${frontpadData.card || '—'} | Скидка: ${frontpadData.sale || '0'}%</div>` : '<div class="card-info">🔄 Данные из FrontPad не получены</div>';
            
            const html = `
                <h2>🎁 МОЯ КАРТА ГОСТЯ</h2>
                <div class="card">
                    <h3>💰 БОНУСНЫЙ БАЛАНС</h3>
                    <div class="bonus-balance">${userBonuses.balance}</div>
                    <p>100 бонусов = 50₽ скидки</p>
                    <p>≈ ${balanceInRubles} ₽ кэшбэка</p>
                    ${fpInfo}
                    <button id="syncBtn">🔄 ОБНОВИТЬ БОНУСЫ</button>
                </div>
                <div class="card">
                    <h3>📜 ИСТОРИЯ</h3>
                    ${userBonuses.history.length === 0 ? '<p>Пока нет операций</p>' : userBonuses.history.slice(0, 10).map(h => `
                        <div class="history-item">
                            <div class="history-date">${h.date}</div>
                            <div><span class="history-amount">+${h.amount}</span> — ${h.reason}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('app').innerHTML = html;
            document.getElementById('syncBtn')?.addEventListener('click', async () => {
                showToast("🔄 Синхронизация...");
                await syncBonusesWithFrontpad();
                await renderBonus();
            });
        }
        
        function renderPromo() {
            const html = `<h2>🔥 АКЦИИ</h2>
                <div class="card"><strong>🕒 СЧАСТЛИВЫЕ ЧАСЫ</strong><br>Пн-Пт 12:00-17:00, кальян 1500₽<br><button class="copyPromoBtn" data-code="HAPPY1500">📋 КОД: HAPPY1500</button></div>
                <div class="card"><strong>🎂 ДЕНЬ РОЖДЕНИЯ</strong><br>Скидка 20% на весь счёт<br><button class="copyPromoBtn" data-code="BIRTHDAY20">📋 КОД: BIRTHDAY20</button></div>`;
            document.getElementById('app').innerHTML = html;
            document.querySelectorAll('.copyPromoBtn').forEach(btn => btn.addEventListener('click', () => { navigator.clipboard.writeText(btn.dataset.code); showToast("✅ Код скопирован"); }));
        }
        
        function renderContacts() {
            const html = `<h2>📞 КОНТАКТЫ</h2>
                <div class="card"><p>📍 ул. Молодежная 15Б, Химки</p><p>📞 <a href="tel:+79099846677" style="color:#e84545;">+7 (909) 984-66-77</a></p><p>🕒 Вс-Чт: 12:00 – 02:00</p><p>🕒 Пт-Сб: 12:00 – 03:00</p><p>📱 <a href="https://t.me/huqqa_lounge" style="color:#e84545;">@huqqa_lounge</a></p></div>`;
            document.getElementById('app').innerHTML = html;
        }
        
        // ========== Роутинг ==========
        let currentTab = "booking";
        
        async function renderCurrentTab() {
            if (!isRegistered) {
                await showPhoneRegistrationModal();
                renderCurrentTab();
                return;
            }
            if (currentTab === 'booking') await renderBooking();
            else if (currentTab === 'menu') renderMenu();
            else if (currentTab === 'call') await renderCall();
            else if (currentTab === 'bonus') await renderBonus();
            else if (currentTab === 'promo') renderPromo();
            else if (currentTab === 'contacts') renderContacts();
        }
        
        function showPhoneRegistrationModal() {
            return new Promise((resolve) => {
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `<div class="modal-content">
                    <h3>⟡ HUQQA LOUNGE ⟡</h3>
                    <p>Укажите ваши данные</p>
                    <p style="color:#e84545;">🎁 +300 БОНУСОВ ЗА РЕГИСТРАЦИЮ</p>
                    <input type="tel" id="phoneInput" placeholder="+7 XXX XXX-XX-XX">
                    <input type="date" id="birthdayInput" max="${new Date().toISOString().split('T')[0]}">
                    <button id="savePhoneBtn">ПРОДОЛЖИТЬ</button>
                </div>`;
                document.body.appendChild(modal);
                document.getElementById('savePhoneBtn')?.addEventListener('click', async () => {
                    const phone = document.getElementById('phoneInput').value.trim();
                    const birthday = document.getElementById('birthdayInput').value;
                    if (!phone || !birthday) { showToast("Заполните все поля", true); return; }
                    await saveUserDataToCloud(phone, birthday);
                    modal.remove();
                    resolve(true);
                });
            });
        }
        
        function setupTabs() {
            const tabBar = document.getElementById('tabBar');
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    currentTab = tab.dataset.tab;
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    renderCurrentTab();
                });
            });
        }
        
        // ========== ЗАПУСК ==========
        loadUserData();
        loadBonuses();
        setupTabs();
        document.querySelector('.tab')?.classList.add('active');
        
        // Если пользователь зарегистрирован, синхронизируем бонусы
        if (isRegistered && userPhone) {
            syncBonusesWithFrontpad().then(() => renderCurrentTab());
        } else {
            renderCurrentTab();
        }
    </script>
</body>
</html>
