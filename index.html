<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Huqqa Lounge | Премиум лаунж</title>
    <style>
        /* Все стили остаются как в предыдущей версии */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0c;
            color: #ffffff;
            padding-bottom: 70px;
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(30, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.95) 100%);
            pointer-events: none;
            z-index: -1;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; padding-top: env(safe-area-inset-top, 20px); }
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(8, 8, 10, 0.95); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around;
            padding: 10px 16px calc(10px + env(safe-area-inset-bottom, 0px));
            border-top: 1px solid rgba(220, 40, 40, 0.3);
            z-index: 1000;
        }
        .tab {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            background: none; border: none; font-size: 11px; font-weight: 500;
            color: rgba(255, 255, 255, 0.45); cursor: pointer; padding: 8px 12px;
            border-radius: 24px; transition: all 0.25s ease;
        }
        .tab.active { color: #e84545; background: rgba(232, 69, 69, 0.12); }
        .card, .menu-item, .promo-card, .booking-item, .admin-booking, .booking-card {
            background: linear-gradient(135deg, rgba(18, 18, 22, 0.95) 0%, rgba(12, 12, 16, 0.98) 100%);
            border-radius: 24px; padding: 20px; margin-bottom: 16px;
            border: 1px solid rgba(232, 69, 69, 0.25); transition: all 0.3s ease;
        }
        .card:hover, .menu-item:hover { transform: translateY(-3px); border-color: rgba(232, 69, 69, 0.6); }
        input, select, textarea {
            font-size: 16px; padding: 14px 16px; border-radius: 16px;
            border: 1.5px solid rgba(232, 69, 69, 0.2); background: rgba(5, 5, 7, 0.9);
            color: #ffffff; width: 100%; margin-bottom: 14px;
        }
        input:focus { outline: none; border-color: #e84545; box-shadow: 0 0 0 3px rgba(232, 69, 69, 0.2); }
        button {
            background: linear-gradient(135deg, #e84545 0%, #c92a2a 100%);
            color: #ffffff; border: none; font-weight: 600; cursor: pointer;
            font-size: 16px; padding: 14px 20px; border-radius: 16px;
            width: 100%; margin-bottom: 12px; transition: all 0.2s ease;
        }
        button:hover { transform: scale(0.98); box-shadow: 0 8px 24px rgba(232, 69, 69, 0.35); }
        .confirm-btn { background: linear-gradient(135deg, #2d8a4e, #1e6b3b); width: auto; padding: 8px 18px; margin-right: 8px; }
        .cancel-btn { background: linear-gradient(135deg, #dc3545, #a71d2a); width: auto; padding: 8px 18px; }
        .edit-btn { background: linear-gradient(135deg, #2d6a9f, #1e4d73); width: auto; padding: 8px 18px; margin-right: 8px; }
        .broadcast-btn, .refresh-btn, .birthday-btn { width: auto; padding: 10px 20px; margin-bottom: 0; }
        .broadcast-btn { background: linear-gradient(135deg, #8b2c9d, #6b1f7a); }
        .refresh-btn { background: linear-gradient(135deg, #3a3a45, #2a2a32); }
        .birthday-btn { background: linear-gradient(135deg, #e84545, #c92a2a); }
        .delete-user-btn { background: linear-gradient(135deg, #dc3545, #a71d2a); width: auto; padding: 8px 18px; }
        .reset-btn { background: linear-gradient(135deg, #ff9800, #f57c00); width: auto; padding: 8px 12px; margin-right: 8px; font-size: 12px; }
        .bonus-balance { font-size: 56px; font-weight: 800; text-align: center; margin: 20px 0; background: linear-gradient(135deg, #ff6b6b, #e84545); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .restaurant-header h1 { font-size: 34px; font-weight: 800; background: linear-gradient(135deg, #ffffff, #e84545); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; }
        h2 { font-size: 22px; font-weight: 600; margin: 20px 0 16px 0; border-left: 3px solid #e84545; padding-left: 12px; }
        h3 { font-size: 18px; font-weight: 600; margin-bottom: 12px; color: #e84545; }
        .menu-category { font-size: 20px; font-weight: 700; margin: 24px 0 14px 0; padding-bottom: 8px; border-bottom: 2px solid rgba(232, 69, 69, 0.5); }
        .menu-item { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; padding: 12px 16px; }
        .menu-item span { font-weight: 600; color: #e84545; background: rgba(232, 69, 69, 0.12); padding: 4px 12px; border-radius: 20px; }
        .status-pending { color: #e84545; background: rgba(232, 69, 69, 0.15); padding: 4px 12px; border-radius: 20px; display: inline-block; }
        .status-confirmed { color: #2d8a4e; background: rgba(45, 138, 78, 0.15); padding: 4px 12px; border-radius: 20px; display: inline-block; }
        .toast {
            position: fixed; bottom: 90px; left: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px);
            color: #e84545; padding: 14px 20px; border-radius: 60px;
            text-align: center; z-index: 2000; animation: fadeInOut 2.5s ease;
            border: 1px solid rgba(232, 69, 69, 0.4);
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.92); backdrop-filter: blur(16px);
            display: flex; align-items: center; justify-content: center; z-index: 3000;
        }
        .modal-content {
            background: linear-gradient(135deg, #121215, #0a0a0d);
            border-radius: 32px; padding: 28px; width: 90%; max-width: 500px;
            border: 1px solid rgba(232, 69, 69, 0.4);
        }
        .admin-panel { background: linear-gradient(135deg, #e84545, #c92a2a); color: #ffffff; padding: 6px 14px; border-radius: 60px; font-size: 12px; display: inline-block; margin-bottom: 12px; }
        .delete-mode-indicator { background: rgba(232, 69, 69, 0.1); border: 1px solid rgba(232, 69, 69, 0.3); padding: 12px; border-radius: 20px; font-size: 12px; margin-bottom: 20px; text-align: center; }
        label { font-size: 13px; font-weight: 500; margin-bottom: 6px; display: block; color: rgba(255, 255, 255, 0.6); }
        .button-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .loading { text-align: center; padding: 60px; color: rgba(232, 69, 69, 0.6); }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading">⟡ ЗАГРУЗКА ПРЕМИУМ ОПЫТА ⟡</div>
    </div>

    <div class="tab-bar">
        <button class="tab" data-tab="booking">📅<span>СТОЛ</span></button>
        <button class="tab" data-tab="menu">📖<span>МЕНЮ</span></button>
        <button class="tab" data-tab="bonus">🎁<span>КАРТА</span></button>
        <button class="tab" data-tab="promo">🔥<span>АКЦИИ</span></button>
        <button class="tab" data-tab="contacts">📞<span>КОНТАКТЫ</span></button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // ==================== НАСТРОЙКИ ====================
        const SHEET_API = "https://api.sheetbest.com/sheets/86b2770d-6921-43a6-ada0-a16dbd1ce54c";
        const USERS_API = "https://api.sheetbest.com/sheets/912a1d92-a006-4a4c-9085-7d6f3722e453";
        const ADMIN_IDS = [755574601];
        const BOT_TOKEN = "8696170529:AAGtVDCEntgnKdvgaEdQ44DZnnBORHjAyNM";
        // ===================================================
        
        let tg = window.Telegram?.WebApp;
        if (!tg || !tg.initDataUnsafe?.user?.id) {
            tg = {
                initDataUnsafe: { user: { id: 755574601, first_name: "Admin", username: "admin" } },
                ready: () => {},
                expand: () => {},
                close: () => {},
                HapticFeedback: { impactOccurred: () => {} },
                themeParams: { bg_color: "#0a0a0c", text_color: "#ffffff", button_color: "#e84545" }
            };
        }
        
        tg.expand();
        tg.ready();
        document.body.style.background = '#0a0a0c';
        
        const TELEGRAM_USER_ID = tg.initDataUnsafe.user.id;
        const TELEGRAM_USER_NAME = tg.initDataUnsafe.user.first_name || "Гость";
        const IS_ADMIN = ADMIN_IDS.includes(TELEGRAM_USER_ID);
        
        // ========== Регистрация ==========
        let userPhone = null;
        let userBirthday = null;
        let isRegistered = false;
        
        function loadUserData() {
            const saved = localStorage.getItem(`huqqa_user_${TELEGRAM_USER_ID}`);
            if (saved) {
                const data = JSON.parse(saved);
                userPhone = data.phone;
                userBirthday = data.birthday;
                isRegistered = !!userPhone;
            }
        }
        
        async function checkForceReauth() {
            try {
                const response = await fetch(USERS_API);
                const users = await response.json();
                const user = users.find(u => String(u.userId) === String(TELEGRAM_USER_ID));
                if (user && user.forceReauth === "true") {
                    // Очищаем localStorage
                    for (let key in localStorage) {
                        if (key.startsWith('huqqa_')) localStorage.removeItem(key);
                    }
                    // Снимаем флаг
                    await fetch(`${USERS_API}/id/${user.id}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ forceReauth: "false" })
                    });
                    return true;
                }
                return false;
            } catch (error) {
                return false;
            }
        }
        
        async function saveUserDataToCloud(phone, birthday) {
            try {
                const response = await fetch(USERS_API);
                const users = await response.json();
                const existing = users.find(u => String(u.userId) === String(TELEGRAM_USER_ID));
                
                if (!existing) {
                    const newUser = {
                        id: Date.now().toString(),
                        userId: String(TELEGRAM_USER_ID),
                        name: TELEGRAM_USER_NAME,
                        phone: phone,
                        birthday: birthday,
                        registeredAt: new Date().toISOString(),
                        forceReauth: "false"
                    };
                    await fetch(USERS_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify([newUser])
                    });
                    addBonus("⟡ Регистрация в Huqqa Lounge ⟡", 300);
                    showToast("⟡ +300 бонусов за регистрацию! ⟡");
                } else if (existing.phone !== phone || existing.birthday !== birthday) {
                    await fetch(`${USERS_API}/id/${existing.id}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: phone, birthday: birthday })
                    });
                }
                
                userPhone = phone;
                userBirthday = birthday;
                isRegistered = true;
                localStorage.setItem(`huqqa_user_${TELEGRAM_USER_ID}`, JSON.stringify({
                    phone: phone,
                    birthday: birthday,
                    registeredAt: new Date().toISOString()
                }));
                
                return true;
            } catch (error) {
                console.error("Ошибка:", error);
                return false;
            }
        }
        
        async function getBroadcastUsers() {
            try {
                const response = await fetch(USERS_API);
                return await response.json();
            } catch (error) {
                return [];
            }
        }
        
        // ========== АВТОУДАЛЕНИЕ ПРОСРОЧЕННЫХ БРОНЕЙ ==========
        function isBookingExpired(booking) {
            if (!booking.date || !booking.time) return false;
            const bookingDateTime = new Date(`${booking.date}T${booking.time}`);
            const now = new Date();
            const hoursDiff = (now - bookingDateTime) / (1000 * 60 * 60);
            return hoursDiff > 24;
        }
        
        async function deleteExpiredBookings() {
            try {
                const response = await fetch(SHEET_API);
                const allBookings = await response.json();
                let deletedCount = 0;
                for (const booking of allBookings) {
                    if (isBookingExpired(booking)) {
                        await fetch(`${SHEET_API}/id/${booking.id}`, { method: 'DELETE' });
                        deletedCount++;
                    }
                }
                return deletedCount;
            } catch (error) {
                return 0;
            }
        }
        
        // ========== ПРОВЕРКА ДНЕЙ РОЖДЕНИЙ ==========
        async function manualBirthdayCheck() {
            showToast("🔍 ПРОВЕРКА ДНЕЙ РОЖДЕНИЙ...");
            try {
                const response = await fetch(USERS_API);
                const users = await response.json();
                let found = [];
                
                for (const user of users) {
                    if (!user.birthday || user.forceReauth === "true") continue;
                    const birthday = new Date(user.birthday);
                    const today = new Date();
                    const nextBirthday = new Date(today.getFullYear(), birthday.getMonth(), birthday.getDate());
                    if (nextBirthday < today) nextBirthday.setFullYear(today.getFullYear() + 1);
                    const daysLeft = Math.ceil((nextBirthday - today) / (1000 * 60 * 60 * 24));
                    
                    if (daysLeft <= 7 && daysLeft >= 0) {
                        found.push({ ...user, daysLeft });
                        const lastSent = user.lastNotificationSent;
                        const currentYear = new Date().getFullYear();
                        if (!lastSent || !lastSent.includes(currentYear.toString())) {
                            let message = daysLeft === 0 
                                ? `🎂 *С ДНЁМ РОЖДЕНИЯ, ${user.name.toUpperCase()}!* 🎂\n\nHuqqa Lounge дарит *СКИДКУ 20%* на весь счёт!\n\n🎁 *ПРОМОКОД:* BIRTHDAY20\n\nЖдём вас! ⟡`
                                : `🎂 *ДОРОГОЙ(АЯ) ${user.name.toUpperCase()}!*\n\nЧерез ${daysLeft} дня у вас день рождения! 🎉\n\n✨ *ПРОМОКОД:* BIRTHDAY20 ✨\n\nЖдём вас! ⟡`;
                            
                            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ chat_id: user.userId, text: message, parse_mode: 'Markdown' })
                            });
                            await fetch(`${USERS_API}/id/${user.id}`, {
                                method: 'PATCH',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ lastNotificationSent: new Date().toISOString() })
                            });
                            await new Promise(resolve => setTimeout(resolve, 500));
                        }
                    }
                }
                
                if (found.length === 0) {
                    showToast("🎂 В ближайшие 7 дней нет именинников");
                } else {
                    let message = "🎂 *БЛИЖАЙШИЕ ИМЕНИННИКИ (7 ДНЕЙ):*\n\n";
                    for (const u of found) {
                        message += `👤 ${u.name}\n📞 ${u.phone}\n🎂 ДР через ${u.daysLeft} дн.\n\n`;
                    }
                    message += `🎁 Промокод: BIRTHDAY20`;
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: TELEGRAM_USER_ID, text: message, parse_mode: 'Markdown' })
                    });
                    showToast(`✅ Найдено ${found.length} именинников. Поздравления отправлены!`);
                }
            } catch (error) {
                showToast("❌ Ошибка проверки", true);
            }
        }
        
        // ========== Функция принудительной перерегистрации ==========
        async function forceUserReauth(userId) {
            try {
                const response = await fetch(USERS_API);
                const users = await response.json();
                const user = users.find(u => String(u.userId) === String(userId));
                if (user) {
                    await fetch(`${USERS_API}/id/${user.id}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ forceReauth: "true" })
                    });
                    return true;
                }
                return false;
            } catch (error) {
                console.error("Ошибка установки флага перерегистрации:", error);
                return false;
            }
        }
        
        // ========== ОТПРАВКА УВЕДОМЛЕНИЯ АДМИНИСТРАТОРУ ==========
        async function sendNotificationToAdmins(booking) {
            const adminIds = ADMIN_IDS;
            const message = `🆕 *НОВАЯ БРОНЬ В HUQQA LOUNGE!*\n\n👤 *Имя:* ${booking.name}\n📞 *Телефон:* ${booking.phone}\n📅 *Дата:* ${booking.date}\n⏰ *Время:* ${booking.time}\n👥 *Гостей:* ${booking.guests}\n🆔 *TG ID:* ${booking.userId}\n\n_Для подтверждения зайдите в админ-панель_`;
            for (const adminId of adminIds) {
                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: adminId, text: message, parse_mode: 'Markdown' })
                    });
                } catch (error) {}
            }
        }
        
        // ========== РЕДАКТИРОВАНИЕ БРОНИ ==========
        function showEditBookingModal(booking) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>✏️ РЕДАКТИРОВАТЬ БРОНЬ</h3>
                    <label>👤 Имя</label><input type="text" id="editName" value="${booking.name || ''}">
                    <label>📞 Телефон</label><input type="tel" id="editPhone" value="${booking.phone || ''}">
                    <label>📅 Дата</label><input type="date" id="editDate" value="${booking.date || ''}">
                    <label>⏰ Время</label><input type="time" id="editTime" value="${booking.time || ''}">
                    <label>👥 Количество гостей</label><input type="number" id="editGuests" value="${booking.guests || 2}" min="1" max="20">
                    <label>📊 Статус</label>
                    <select id="editStatus">
                        <option value="pending" ${booking.status === 'pending' ? 'selected' : ''}>⏳ Ожидает</option>
                        <option value="confirmed" ${booking.status === 'confirmed' ? 'selected' : ''}>✅ Подтверждено</option>
                    </select>
                    <div class="button-group"><button id="saveEditBtn" style="background: linear-gradient(135deg, #2d8a4e, #1e6b3b);">💾 СОХРАНИТЬ</button><button id="closeEditBtn">ОТМЕНА</button></div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('saveEditBtn')?.addEventListener('click', async () => {
                const updatedBooking = {
                    ...booking,
                    name: document.getElementById('editName').value,
                    phone: document.getElementById('editPhone').value,
                    date: document.getElementById('editDate').value,
                    time: document.getElementById('editTime').value,
                    guests: parseInt(document.getElementById('editGuests').value),
                    status: document.getElementById('editStatus').value
                };
                if (!updatedBooking.phone || !updatedBooking.date || !updatedBooking.time) { showToast("Заполните все поля", true); return; }
                await updateBooking(booking.id, updatedBooking);
                showToast(`✅ Бронь обновлена!`);
                modal.remove();
                renderAdminPanel();
            });
            document.getElementById('closeEditBtn')?.addEventListener('click', () => modal.remove());
        }
        
        // ========== РАССЫЛКА ==========
        async function sendPhotoMessage(chatId, caption, imageFile) {
            try {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', imageFile);
                formData.append('caption', `⟡ *НОВОСТЬ HUQQA LOUNGE* ⟡\n\n${caption}\n\n— Администрация Huqqa Lounge`);
                formData.append('parse_mode', 'Markdown');
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                return response.ok;
            } catch { return false; }
        }
        
        async function sendTextMessage(chatId, text) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: `⟡ *НОВОСТЬ HUQQA LOUNGE* ⟡\n\n${text}\n\n— Администрация Huqqa Lounge`, parse_mode: 'Markdown' })
                });
                return response.ok;
            } catch { return false; }
        }
        
        async function sendBroadcast(message, imageFile = null) {
            const users = await getBroadcastUsers();
            if (users.length === 0) { showToast("❌ Нет зарегистрированных пользователей", true); return; }
            let successCount = 0;
            showToast(`📢 Начинаю рассылку ${users.length} пользователям...`);
            for (const user of users) {
                if (user.forceReauth === "true") continue;
                let sent = false;
                if (imageFile) sent = await sendPhotoMessage(user.userId, message, imageFile);
                else sent = await sendTextMessage(user.userId, message);
                if (sent) successCount++;
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            showToast(`✅ Рассылка завершена! Отправлено: ${successCount}`);
        }
        
        function showBroadcastModal() {
            getBroadcastUsers().then(users => {
                let selectedImage = null;
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `<div class="modal-content"><h3>📢 СДЕЛАТЬ РАССЫЛКУ</h3><p>👥 Пользователей: ${users.filter(u => u.forceReauth !== "true").length}</p><textarea id="broadcastMessage" placeholder="Введите текст сообщения..." rows="4"></textarea><input type="file" id="broadcastImage" accept="image/jpeg,image/png,image/gif,image/webp"><div id="imagePreviewContainer" style="display:none;"><img id="imagePreview" style="max-width:100%; border-radius:12px;"><button id="removeImageBtn" class="remove-image-btn" style="background:#dc3545; padding:6px 12px; width:auto;">🗑 Удалить фото</button></div><div class="button-group"><button id="sendBroadcastBtn">📤 ОТПРАВИТЬ</button><button id="closeModalBtn">ОТМЕНА</button></div></div>`;
                document.body.appendChild(modal);
                const messageInput = document.getElementById('broadcastMessage');

                    if (file) {
                        selectedImage = file;
                        const reader = new FileReader();
                        reader.onload = (event) => { previewImg.src = event.target.result; previewContainer.style.display = 'block'; };
                        reader.readAsDataURL(file);
                    }
                });
                document.getElementById('removeImageBtn')?.addEventListener('click', () => {
                    selectedImage = null;
                    imageInput.value = '';
                    previewContainer.style.display = 'none';
                    previewImg.src = '';

        let userBonuses = { balance: 0, history: [] };
        
        function loadBonuses() {
            const saved = localStorage.getItem(`huqqa_bonuses_${TELEGRAM_USER_ID}`);
            if (saved) userBonuses = JSON.parse(saved);
            else { userBonuses = { balance: 0, history: [] }; saveBonuses(); }
        }
        
        function saveBonuses() { localStorage.setItem(`huqqa_bonuses_${TELEGRAM_USER_ID}`, JSON.stringify(userBonuses)); }
        
        function addBonus(reason, amount) {
            userBonuses.balance += amount;
            userBonuses.history.unshift({ date: new Date().toLocaleString(), reason: reason, amount: amount });
            if (userBonuses.history.length > 10) userBonuses.history.pop();
            saveBonuses();
        }
        
        async function loadBookings() {
            try {
                const response = await fetch(SHEET_API);
                bookings = await response.json();
                return bookings;
            } catch { bookings = []; return []; }
        }
        
        async function saveBooking(booking) {
            try {
                booking.id = Date.now().toString();
                booking.created_at = new Date().toISOString();
                booking.phone = userPhone || booking.phone;
                const response = await fetch(SHEET_API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify([booking]) });
                return response.ok ? booking : null;
            } catch { showToast("Ошибка сохранения!", true); return null; }
        }
        
        async function updateBooking(bookingId, updatedData) {
            try {
                const response = await fetch(`${SHEET_API}/id/${bookingId}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updatedData) });
                return response.ok;
            } catch { return false; }
        }
        
        async function deleteBooking(bookingId) {
            try { await fetch(`${SHEET_API}/id/${bookingId}`, { method: 'DELETE' }); return true; } catch { return false; }
        }
        
        async function deleteUserAndBookings(userId, userRowId) {
            try {
                await fetch(`${USERS_API}/id/${userRowId}`, { method: 'DELETE' });
                const bookingsResponse = await fetch(SHEET_API);
                const allBookings = await bookingsResponse.json();
                const userBookings = allBookings.filter(b => String(b.userId) === String(userId));
                for (const booking of userBookings) { await fetch(`${SHEET_API}/id/${booking.id}`, { method: 'DELETE' }); }
                return userBookings.length;
            } catch (error) { throw error; }
        }
        
        function showToast(message, isError = false) {

            document.body.appendChild(toast);

                });

            html += `<h2>✅ ПОДТВЕРЖДЁННЫЕ (${confirmedBookings.length})</h2>`;

                const name = document.getElementById('name').value;

            document.getElementById('app').innerHTML = html;
            document.getElementById('shareContactBtn')?.addEventListener('click', () => showToast(`Номер передан ресторану`));

        let currentTab = "booking";
        
        async function renderCurrentTab() {
            // Проверяем, нужно ли принудительно очистить localStorage
            const needReauth = await checkForceReauth();
            if (needReauth) {
                isRegistered = false;
                userPhone = null;
                userBirthday = null;
            }
            
            if (!isRegistered) { await showPhoneRegistrationModal(); renderCurrentTab(); return; }
            if (currentTab === 'admin' && IS_ADMIN) await renderAdminPanel();
            else if (currentTab === 'booking') await renderBooking();
            else if (currentTab === 'menu') renderMenu();
            else if (currentTab === 'bonus') renderBonus();
            else if (currentTab === 'promo') renderPromo();
            else if (currentTab === 'contacts') renderContacts();
            else await renderBooking();

        function showPhoneRegistrationModal() {
            return new Promise((resolve) => {
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `<div class="modal-content"><h3>⟡ HUQQA LOUNGE ⟡</h3><p style="text-align:center;">Укажите ваши данные для бронирования</p><p style="text-align:center; color:#e84545;">🎁 +300 БОНУСОВ ЗА РЕГИСТРАЦИЮ!</p><label>📞 НОМЕР ТЕЛЕФОНА</label><input type="tel" id="phoneInput" placeholder="+7 (XXX) XXX-XX-XX"><label>🎂 ДАТА РОЖДЕНИЯ</label><input type="date" id="birthdayInput" max="${new Date().toISOString().split('T')[0]}"><div class="button-group"><button id="savePhoneBtn">⟡ ПРОДОЛЖИТЬ ⟡</button></div></div>`;
                document.body.appendChild(modal);
                document.getElementById('savePhoneBtn')?.addEventListener('click', async () => {
                    const phone = document.getElementById('phoneInput').value.trim();
                    const birthday = document.getElementById('birthdayInput').value;
                    if (!phone || !birthday) { showToast("Заполните все поля", true); return; }
                    await saveUserDataToCloud(phone, birthday);
                    modal.remove();
                    resolve(true);
                });
            });
        }
        
        function setupTabs() {
            const tabBar = document.querySelector('.tab-bar');
            if (IS_ADMIN && !document.querySelector('.tab[data-tab="admin"]')) {
                const adminTab = document.createElement('button');
                adminTab.className = 'tab';
                adminTab.setAttribute('data-tab', 'admin');
                adminTab.innerHTML = '👑<span>АДМИН</span>';
                tabBar.appendChild(adminTab);
            }
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    currentTab = tab.dataset.tab;
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    renderCurrentTab();
                });
            });
        }
        
        loadUserData();
        loadBonuses();
        setupTabs();
        document.querySelector('.tab').classList.add('active');
        renderCurrentTab();
        
        setInterval(async () => {
            if (IS_ADMIN && currentTab === 'admin') {
                const deleted = await deleteExpiredBookings();
                if (deleted > 0) renderAdminPanel();
            }
        }, 5 * 60 * 1000);
        
        console.log("👤 User ID:", TELEGRAM_USER_ID);
        console.log("👑 Is Admin:", IS_ADMIN);
    </script>
