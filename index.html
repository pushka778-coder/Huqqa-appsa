<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Huqqa Lounge | Премиум лаунж</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0c;
            color: #ffffff;
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(30, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.95) 100%);
            pointer-events: none;
            z-index: -1;
        }
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 20px; 
            padding-bottom: 90px;
            padding-top: env(safe-area-inset-top, 20px);
        }
        
        .tab-bar-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(8, 8, 10, 0.96);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(220, 40, 40, 0.4);
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom, 10px);
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: #e84545 #2a2a2a;
        }
        .tab-bar-wrapper::-webkit-scrollbar {
            height: 3px;
        }
        .tab-bar-wrapper::-webkit-scrollbar-track {
            background: #2a2a2a;
            border-radius: 10px;
        }
        .tab-bar-wrapper::-webkit-scrollbar-thumb {
            background: #e84545;
            border-radius: 10px;
        }
        .tab-bar {
            display: inline-flex;
            justify-content: flex-start;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            white-space: nowrap;
        }
        
        .tab {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 40px;
            transition: all 0.2s ease;
            font-family: inherit;
            backdrop-filter: blur(4px);
        }
        .tab.active { 
            color: #e84545; 
            background: rgba(232, 69, 69, 0.15);
            box-shadow: 0 0 4px rgba(232, 69, 69, 0.3);
        }
        .tab span {
            font-size: 10px;
            letter-spacing: 0.3px;
        }
        .tab .emoji-big {
            font-size: 22px;
        }
        
        .card, .menu-item, .promo-card, .booking-item, .admin-booking, .booking-card {
            background: linear-gradient(135deg, rgba(18, 18, 22, 0.95) 0%, rgba(12, 12, 16, 0.98) 100%);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(232, 69, 69, 0.25);
            transition: all 0.3s ease;
        }
        .card:hover, .menu-item:hover { transform: translateY(-3px); border-color: rgba(232, 69, 69, 0.6); }
        .menu-category {
            font-size: 20px;
            font-weight: 700;
            margin: 16px 0 12px 0;
            color: #e84545;
            border-left: 3px solid #e84545;
            padding-left: 12px;
        }
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 8px;
        }
        input, select, textarea {
            font-size: 16px;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1.5px solid rgba(232, 69, 69, 0.2);
            background: rgba(5, 5, 7, 0.9);
            color: #ffffff;
            width: 100%;
            margin-bottom: 14px;
        }
        input:focus, textarea:focus { outline: none; border-color: #e84545; box-shadow: 0 0 0 3px rgba(232, 69, 69, 0.2); }
        input:read-only { opacity: 0.7; cursor: default; border-color: rgba(232, 69, 69, 0.3); }
        button {
            background: linear-gradient(135deg, #e84545 0%, #c92a2a 100%);
            color: #ffffff;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            padding: 14px 20px;
            border-radius: 16px;
            width: 100%;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }
        button:hover { transform: scale(0.98); box-shadow: 0 8px 24px rgba(232, 69, 69, 0.35); }
        .btn-secondary { background: linear-gradient(135deg, #3a3a45, #2a2a32); margin-bottom: 0; width: auto; padding: 10px 20px; }
        .btn-success { background: linear-gradient(135deg, #28a745, #1e6b3b); }
        .button-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }
        .restaurant-header h1 { font-size: 34px; font-weight: 800; background: linear-gradient(135deg, #ffffff, #e84545); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; }
        h2 { font-size: 22px; font-weight: 600; margin: 20px 0 16px 0; border-left: 3px solid #e84545; padding-left: 12px; }
        h3 { font-size: 18px; font-weight: 600; margin-bottom: 12px; color: #e84545; }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            color: #e84545;
            padding: 14px 20px;
            border-radius: 60px;
            text-align: center;
            z-index: 2000;
            animation: fadeInOut 2.5s ease;
            border: 1px solid rgba(232, 69, 69, 0.4);
            font-weight: 500;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.94);
            backdrop-filter: blur(18px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal-content {
            background: linear-gradient(135deg, #121215, #0a0a0d);
            border-radius: 32px;
            padding: 28px;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(232, 69, 69, 0.4);
        }
        label { font-size: 13px; font-weight: 500; margin-bottom: 6px; display: block; color: rgba(255, 255, 255, 0.7); }
        .info-text { color: rgba(255,255,255,0.6); font-size: 14px; text-align: center; margin-top: 10px; }
        .status-pending { color: #f0ad4e; background: rgba(240, 173, 78, 0.2); padding: 4px 10px; border-radius: 30px; font-size: 12px; }
        .status-confirmed { color: #5cb85c; background: rgba(92, 184, 92, 0.2); padding: 4px 10px; border-radius: 30px; font-size: 12px; }
        .bonus-balance { font-size: 48px; font-weight: 800; text-align: center; color: #e84545; margin: 10px 0; }
        .promo-card { margin-bottom: 12px; }
        .update-bonus-btn {
            background: linear-gradient(135deg, #3a3a45, #2a2a32);
            padding: 8px 16px;
            font-size: 14px;
            margin-top: 10px;
        }
        .bonus-loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(232, 69, 69, 0.3);
            border-radius: 50%;
            border-top-color: #e84545;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .tab { padding: 6px 12px; }
            .tab .emoji-big { font-size: 20px; }
            .tab span { font-size: 9px; }
        }
    </style>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <div class="container" id="app">
        <div class="loading">⟡ ЗАГРУЗКА ПРЕМИУМ ОПЫТА ⟡</div>
    </div>

    <div class="tab-bar-wrapper">
        <div class="tab-bar" id="tabBar">
            <button class="tab" data-tab="booking">📅<span>СТОЛ</span></button>
            <button class="tab" data-tab="menu">📖<span>МЕНЮ</span></button>
            <button class="tab" data-tab="call">🔔<span>ВЫЗОВ КАЛЬЯНЩИКА</span></button>
            <button class="tab" data-tab="bonus">🎁<span>КАРТА</span></button>
            <button class="tab" data-tab="promo">🔥<span>АКЦИИ</span></button>
            <button class="tab" data-tab="contacts">📞<span>КОНТАКТЫ</span></button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // ==================== НАСТРОЙКИ ====================
        const SHEET_API = "https://api.sheetbest.com/sheets/86b2770d-6921-43a6-ada0-a16dbd1ce54c";
        const USERS_API = "https://api.sheetbest.com/sheets/912a1d92-a006-4a4c-9085-7d6f3722e453";
        const ADMIN_IDS = [755574601];
        const BOT_TOKEN = "8696170529:AAGtVDCEntgnKdvgaEdQ44DZnnBORHjAyNM";
        const STAFF_CHAT_ID = "-1003809247932";
        
        // Используем CORS прокси для обхода блокировки
        const BONUS_API_URL = "https://cors-anywhere.herokuapp.com/http://45.84.1.161:3000";
        
        // ===================================================
        
        let tg = window.Telegram?.WebApp;
        if (!tg || !tg.initDataUnsafe?.user?.id) {
            tg = {
                initDataUnsafe: { user: { id: 755574601, first_name: "Admin", username: "admin" } },
                ready: () => {},
                expand: () => {},
                close: () => {},
                HapticFeedback: { impactOccurred: () => {} },
                themeParams: { bg_color: "#0a0a0c", text_color: "#ffffff", button_color: "#e84545" }
            };
        }
        
        tg.expand();
        tg.ready();
        document.body.style.background = '#0a0a0c';
        
        const TELEGRAM_USER_ID = tg.initDataUnsafe.user.id;
        const TELEGRAM_USER_NAME = tg.initDataUnsafe.user.first_name || "Гость";
        const IS_ADMIN = ADMIN_IDS.includes(TELEGRAM_USER_ID);
        
        // ========== Регистрация и данные пользователя ==========
        let userPhone = null;
        let userBirthday = null;
        let isRegistered = false;
        let realBonuses = 0;
        
        function loadUserData() {
            const saved = localStorage.getItem(`huqqa_user_${TELEGRAM_USER_ID}`);
            if (saved) {
                const data = JSON.parse(saved);
                userPhone = data.phone;
                userBirthday = data.birthday;
                isRegistered = !!userPhone;
                
                const savedBonus = localStorage.getItem(`huqqa_real_bonus_${TELEGRAM_USER_ID}`);
                if (savedBonus) {
                    realBonuses = parseInt(savedBonus);
                }
            }
        }
        
        async function saveUserDataToCloud(phone, birthday) {
            try {
                const response = await fetch(USERS_API);
                const users = await response.json();
                const existing = users.find(u => String(u.userId) === String(TELEGRAM_USER_ID));
                
                if (!existing) {
                    const newUser = {
                        id: Date.now().toString(),
                        userId: String(TELEGRAM_USER_ID),
                        name: TELEGRAM_USER_NAME,
                        phone: phone,
                        birthday: birthday,
                        registeredAt: new Date().toISOString(),
                        forceReauth: "false"
                    };
                    await fetch(USERS_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify([newUser])
                    });
                    showToast("⟡ Регистрация успешна! ⟡");
                } else if (existing.phone !== phone || existing.birthday !== birthday) {
                    await fetch(`${USERS_API}/id/${existing.id}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: phone, birthday: birthday })
                    });
                }
                
                userPhone = phone;
                userBirthday = birthday;
                isRegistered = true;
                localStorage.setItem(`huqqa_user_${TELEGRAM_USER_ID}`, JSON.stringify({
                    phone: phone,
                    birthday: birthday,
                    registeredAt: new Date().toISOString()
                }));
                
                await updateRealBonuses();
                return true;
            } catch (error) {
                console.error("Ошибка сохранения:", error);
                return false;
            }
        }
        
        // ========== ПОЛУЧЕНИЕ РЕАЛЬНЫХ БОНУСОВ ==========
        async function updateRealBonuses() {
            if (!userPhone) {
                console.log("Номер телефона не указан");
                return null;
            }
            
            try {
                const url = `${BONUS_API_URL}/api/get-bonus?phone=${encodeURIComponent(userPhone)}`;
                console.log("Запрос бонусов:", url);
                
                const response = await fetch(url);
                const data = await response.json();
                
                console.log("Ответ сервера:", data);
                
                if (data.success && typeof data.bonuses === 'number') {
                    realBonuses = data.bonuses;
                    localStorage.setItem(`huqqa_real_bonus_${TELEGRAM_USER_ID}`, realBonuses);
                    localStorage.setItem(`huqqa_bonus_updated_${TELEGRAM_USER_ID}`, Date.now());
                    
                    showToast(`✅ Бонусы: ${realBonuses}`);
                    return realBonuses;
                } else {
                    realBonuses = 0;
                    localStorage.setItem(`huqqa_real_bonus_${TELEGRAM_USER_ID}`, 0);
                    showToast(`⚠️ Номер не зарегистрирован в системе лояльности`, true);
                    return 0;
                }
            } catch (error) {
                console.error("Ошибка получения бонусов:", error);
                showToast(`❌ Ошибка: ${error.message}`, true);
                
                const saved = localStorage.getItem(`huqqa_real_bonus_${TELEGRAM_USER_ID}`);
                realBonuses = saved ? parseInt(saved) : 0;
                return realBonuses;
            }
        }
        
        let userBonuses = { balance: 0, history: [] };
        function loadBonuses() {
            const saved = localStorage.getItem(`huqqa_bonuses_${TELEGRAM_USER_ID}`);
            if (saved) userBonuses = JSON.parse(saved);
            else { userBonuses = { balance: 0, history: [] }; saveBonuses(); }
        }
        function saveBonuses() { 
            localStorage.setItem(`huqqa_bonuses_${TELEGRAM_USER_ID}`, JSON.stringify(userBonuses));
        }
        
        function addBonusToHistory(reason, amount) {
            userBonuses.history.unshift({ date: new Date().toLocaleString(), reason: reason, amount: amount });
            if (userBonuses.history.length > 10) userBonuses.history.pop();
            saveBonuses();
        }
        
        let bookings = [];
        async function loadBookings() {
            try {
                const response = await fetch(SHEET_API);
                bookings = await response.json();
                return bookings;
            } catch { bookings = []; return []; }
        }
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.style.background = isError ? 'rgba(30, 0, 0, 0.95)' : 'rgba(0, 0, 0, 0.95)';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        // ========== МОДУЛЬ ВЫЗОВА КАЛЬЯНЩИКА ==========
        let html5QrCode = null;
        
        async function startScanner() {
            const scannerContainer = document.createElement('div');
            scannerContainer.className = 'modal';
            scannerContainer.id = 'scannerModal';
            scannerContainer.innerHTML = `
                <div class="modal-content" style="text-align: center;">
                    <h3>🔔 ВЫЗОВ КАЛЬЯНЩИКА</h3>
                    <p style="margin-bottom: 12px;">📷 Наведите камеру на QR-код стола</p>
                    <div id="qr-reader" style="width: 100%; margin: 0 auto;"></div>
                    <div class="button-group" style="margin-top: 20px;">
                        <button id="closeScannerBtn" class="btn-secondary">❌ ОТМЕНА</button>
                    </div>
                </div>
            `;
            document.body.appendChild(scannerContainer);
            
            html5QrCode = new Html5Qrcode("qr-reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            try {
                await html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                    html5QrCode.stop().catch(err => console.log(err));
                    scannerContainer.remove();
                    
                    if (decodedText.startsWith("Huqqa-")) {
                        const tableNumber = decodedText.replace("Huqqa-", "");
                        if (tableNumber && !isNaN(parseInt(tableNumber))) {
                            showCallForm(tableNumber);
                        } else {
                            showToast("❌ Неверный формат QR", true);
                        }
                    } else {
                        showToast("❌ Неверный QR-код", true);
                    }
                }, (error) => {});
            } catch (err) {
                console.error(err);
                showToast("❌ Не удалось получить доступ к камере.", true);
                scannerContainer.remove();
            }
            
            document.getElementById('closeScannerBtn')?.addEventListener('click', () => {
                if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop().catch(e => console.log(e));
                scannerContainer.remove();
            });
        }
        
        function showCallForm(tableNumber) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>🔔 ВЫЗОВ КАЛЬЯНЩИКА</h3>
                    <label>🍽️ НОМЕР СТОЛА</label>
                    <input type="text" id="callTableNumber" value="${tableNumber}" readonly>
                    <label>💬 ДОПОЛНИТЕЛЬНО</label>
                    <textarea id="callMessage" rows="3" placeholder="Ваши пожелания..."></textarea>
                    <div class="button-group">
                        <button id="sendCallBtn" class="btn-success">📤 ОТПРАВИТЬ</button>
                        <button id="closeCallBtn" class="btn-secondary">ОТМЕНА</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('sendCallBtn').addEventListener('click', async () => {
                const table = document.getElementById('callTableNumber').value;
                const message = document.getElementById('callMessage').value;
                const userName = TELEGRAM_USER_NAME;
                const userPhoneNumber = userPhone || "Не указан";
                
                const staffMessage = `🆘 *ВЫЗОВ КАЛЬЯНЩИКА* 🆘\n\n👤 ${userName}\n📞 ${userPhoneNumber}\n🎁 Бонусов: ${realBonuses}\n🍽️ Стол №${table}\n💬 ${message || "—"}\n🕐 ${new Date().toLocaleString()}`;
                
                try {
                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: STAFF_CHAT_ID,
                            text: staffMessage,
                            parse_mode: 'Markdown'
                        })
                    });
                    
                    if (response.ok) {
                        showToast("✅ Вызов отправлен!");
                        modal.remove();
                    } else {
                        showToast("❌ Ошибка отправки", true);
                    }
                } catch (error) {
                    showToast("❌ Ошибка сети", true);
                }
            });
            
            document.getElementById('closeCallBtn').addEventListener('click', () => {
                modal.remove();
            });
        }
        
        async function renderCall() {
            const html = `
                <div class="restaurant-header">
                    <h1>🔔 ВЫЗОВ КАЛЬЯНЩИКА</h1>
                    <p style="opacity:0.7;">Отсканируйте QR-код на столе</p>
                </div>
                <div class="card" style="text-align: center;">
                    <div style="font-size: 64px; margin-bottom: 20px;">🔔</div>
                    <button id="scanQrBtn">📷 СКАНИРОВАТЬ QR-КОД</button>
                    <p class="info-text">QR-код выглядит как Huqqa-101</p>
                </div>
            `;
            document.getElementById('app').innerHTML = html;
            document.getElementById('scanQrBtn').addEventListener('click', () => startScanner());
        }
        
        // ========== ОСТАЛЬНЫЕ ВКЛАДКИ (упрощенные для быстродействия) ==========
        async function renderBooking() {
            await loadBookings();
            const myActiveBookings = bookings.filter(b => String(b.userId) === String(TELEGRAM_USER_ID) && !isBookingExpired(b));
            const html = `
                <div class="restaurant-header"><h1>⟡ HUQQA LOUNGE ⟡</h1><p style="opacity:0.6;">ЗАБРОНИРУЙТЕ СТОЛИК</p></div>
                <div class="card">
                    <label>👤 ВАШЕ ИМЯ</label><input type="text" id="name" value="${TELEGRAM_USER_NAME}">
                    <label>📞 ТЕЛЕФОН</label><input type="tel" id="phone" value="${userPhone || ''}" ${userPhone ? 'readonly' : ''}>
                    <label>📅 ДАТА</label><input type="date" id="date" min="${new Date().toISOString().split('T')[0]}">
                    <label>⏰ ВРЕМЯ</label><input type="time" id="time">
                    <label>👥 ГОСТЕЙ</label><input type="number" id="guests" min="1" max="10" value="2">
                    <button id="submitBookingBtn">⟡ ЗАБРОНИРОВАТЬ ⟡</button>
                </div>
                <h3>📋 МОИ БРОНИ</h3>
                ${myActiveBookings.length === 0 ? '<p style="opacity:0.5;">Нет активных броней</p>' : 
                    myActiveBookings.map(b => `<div class="booking-card"><strong>${b.date} в ${b.time}</strong><br>ГОСТЕЙ: ${b.guests} | СТАТУС: ${b.status === 'pending' ? '<span class="status-pending">ОЖИДАЕТ</span>' : '<span class="status-confirmed">ПОДТВЕРЖДЕНО</span>'}</div>`).join('')}
            `;
            document.getElementById('app').innerHTML = html;
            document.getElementById('submitBookingBtn')?.addEventListener('click', async () => {
                const name = document.getElementById('name').value;
                const phone = document.getElementById('phone').value;
                const date = document.getElementById('date').value;
                const time = document.getElementById('time').value;
                const guests = parseInt(document.getElementById('guests').value);
                if (!name || !phone || !date || !time) { showToast("Заполните все поля", true); return; }
                const newBooking = { userId: String(TELEGRAM_USER_ID), name, phone, date, time, guests, status: 'pending' };
                const saved = await saveBooking(newBooking);
                if (saved) { 
                    await sendNotificationToAdmins(newBooking); 
                    showToast(`✅ Стол забронирован!`);
                    setTimeout(() => renderBooking(), 1000); 
                }
            });
        }
        
        function isBookingExpired(booking) {
            if (!booking.date || !booking.time) return false;
            const bookingDateTime = new Date(`${booking.date}T${booking.time}`);
            const now = new Date();
            const hoursDiff = (now - bookingDateTime) / (1000 * 60 * 60);
            return hoursDiff > 24;
        }
        
        async function saveBooking(booking) {
            try {
                booking.id = Date.now().toString();
                booking.created_at = new Date().toISOString();
                booking.phone = userPhone || booking.phone;
                const response = await fetch(SHEET_API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify([booking]) });
                return response.ok ? booking : null;
            } catch { showToast("Ошибка сохранения!", true); return null; }
        }
        
        async function sendNotificationToAdmins(booking) {
            const message = `🆕 *НОВАЯ БРОНЬ!*\n👤 ${booking.name}\n📞 ${booking.phone}\n📅 ${booking.date} ${booking.time}\n👥 ${booking.guests} чел.\n🎁 Бонусов: ${realBonuses}`;
            for (const adminId of ADMIN_IDS) {
                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: adminId, text: message, parse_mode: 'Markdown' }) });
                } catch (error) {}
            }
        }
        
        function renderMenu() {
            const menuItems = [
                { name: "Бизнес кальян (Пн-Пт 12:00-17:00)", price: 1500, category: "Кальяны" },
                { name: "Кальян на классической чаше", price: 1700, category: "Кальяны" },
                { name: "Премиум кальян с сигарным листом", price: 1900, category: "Кальяны" },
                { name: "Авторский кальян", price: 2500, category: "Кальяны" },
                { name: "Энергетик RedBull", price: 300, category: "Напитки" },
                { name: "Лимонад Star Bar", price: 350, category: "Напитки" },
                { name: "Пиво Корона", price: 400, category: "Напитки" },
                { name: "Авторский чай", price: 600, category: "Чаи" },
                { name: "Эспрессо", price: 150, category: "Кофе" },
                { name: "СуперМясная пицца", price: 1000, category: "Пиццы" },
                { name: "Апельсин/Грейпфрут", price: 150, category: "Добавки" }
            ];
            let html = `<h2>📖 НАШЕ МЕНЮ</h2>`;
            const categories = [...new Set(menuItems.map(i => i.category))];
            categories.forEach(cat => {
                html += `<div class="menu-category">${cat}</div>`;
                menuItems.filter(i => i.category === cat).forEach(item => { html += `<div class="menu-item"><strong>${item.name}</strong> <span style="color:#e84545; font-weight:600;">${item.price} ₽</span></div>`; });
            });
            document.getElementById('app').innerHTML = html;
        }
        
        function renderBonus() {
            const displayBonuses = realBonuses || 0;
            const html = `
                <h2>🎁 МОЯ КАРТА ГОСТЯ</h2>
                <div class="card">
                    <h3>💰 БОНУСНЫЙ БАЛАНС</h3>
                    <div class="bonus-balance">${displayBonuses}</div>
                    <p>✨ 100 бонусов = 50₽ скидка</p>
                    <p style="font-size: 12px; opacity: 0.7;">📞 ${userPhone || 'номер не указан'}</p>
                    <button id="updateBonusesBtn" class="update-bonus-btn">🔄 ОБНОВИТЬ БОНУСЫ</button>
                </div>
                <div class="card">
                    <h3>📜 ИСТОРИЯ</h3>
                    ${userBonuses.history.length === 0 ? '<p>Пока нет операций</p>' : 
                        userBonuses.history.map(h => `<div>${h.date} — +${h.amount} (${h.reason})</div>`).join('')}
                </div>
            `;
            document.getElementById('app').innerHTML = html;
            document.getElementById('updateBonusesBtn')?.addEventListener('click', async () => {
                await updateRealBonuses();
                renderBonus();
            });
        }
        
        function renderPromo() {
            const promos = [
                { name: "🕒 СЧАСТЛИВЫЕ ЧАСЫ", desc: "Пн-Пт 12:00-17:00. Кальян 1500₽!", code: "HAPPY1500" },
                { name: "🎂 ДЕНЬ РОЖДЕНИЯ", desc: "Скидка 20% на весь счёт", code: "BIRTHDAY20" }
            ];
            const html = `<h2>🔥 АКЦИИ</h2>${promos.map(p => `<div class="promo-card"><strong>${p.name}</strong><br>${p.desc}<br><button class="copyPromoBtn" data-code="${p.code}">📋 КОД: ${p.code}</button></div>`).join('')}`;
            document.getElementById('app').innerHTML = html;
            document.querySelectorAll('.copyPromoBtn').forEach(btn => { btn.addEventListener('click', () => { navigator.clipboard.writeText(btn.dataset.code); showToast(`✅ Код скопирован`); }); });
        }
        
        function renderContacts() {
            const html = `<h2>📞 КОНТАКТЫ</h2>
                <div class="card">
                    <p>📍 ул. Молодежная 15Б, Химки</p>
                    <p>📞 <a href="tel:+79099846677" style="color:#e84545;">+7 (909) 984-66-77</a></p>
                    <p>🕒 Вс-Чт: 12:00 – 02:00</p>
                    <p>🕒 Пт-Сб: 12:00 – 03:00</p>
                    <p>🌟 Instagram: @huqqa_lounge</p>
                </div>`;
            document.getElementById('app').innerHTML = html;
        }
        
        let currentTab = "booking";
        
        async function renderCurrentTab() {
            if (!isRegistered) { 
                await showPhoneRegistrationModal(); 
                renderCurrentTab(); 
                return; 
            }
            if (currentTab === 'booking') await renderBooking();
            else if (currentTab === 'menu') renderMenu();
            else if (currentTab === 'call') await renderCall();
            else if (currentTab === 'bonus') renderBonus();
            else if (currentTab === 'promo') renderPromo();
            else if (currentTab === 'contacts') renderContacts();
            else await renderBooking();
        }
        
        function showPhoneRegistrationModal() {
            return new Promise((resolve) => {
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `<div class="modal-content">
                    <h3>⟡ HUQQA LOUNGE ⟡</h3>
                    <p style="text-align:center;">Укажите ваш номер телефона</p>
                    <label>📞 ТЕЛЕФОН</label>
                    <input type="tel" id="phoneInput" placeholder="+7 XXX XXX-XX-XX">
                    <label>🎂 ДАТА РОЖДЕНИЯ</label>
                    <input type="date" id="birthdayInput" max="${new Date().toISOString().split('T')[0]}">
                    <button id="savePhoneBtn">⟡ ПРОДОЛЖИТЬ ⟡</button>
                </div>`;
                document.body.appendChild(modal);
                document.getElementById('savePhoneBtn')?.addEventListener('click', async () => {
                    const phone = document.getElementById('phoneInput').value.trim();
                    const birthday = document.getElementById('birthdayInput').value;
                    if (!phone || !birthday) { showToast("Заполните все поля", true); return; }
                    await saveUserDataToCloud(phone, birthday);
                    modal.remove();
                    resolve(true);
                });
            });
        }
        
        function setupTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    currentTab = tab.dataset.tab;
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    renderCurrentTab();
                });
            });
        }
        
        // Автообновление бонусов раз в час
        setInterval(async () => {
            if (isRegistered && userPhone) {
                await updateRealBonuses();
                if (currentTab === 'bonus') {
                    renderBonus();
                }
            }
        }, 3600000);
        
        // Загрузка данных
        loadUserData();
        loadBonuses();
        setupTabs();
        document.querySelector('.tab')?.classList.add('active');
        
        // Запуск приложения
        renderCurrentTab();
    </script>
</body>
</html>
