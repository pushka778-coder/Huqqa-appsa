<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Huqqa Lounge | Премиум лаунж</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0c;
            color: #ffffff;
            padding-bottom: 70px;
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(30, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.95) 100%);
            pointer-events: none;
            z-index: -1;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; padding-top: env(safe-area-inset-top, 20px); }
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(8, 8, 10, 0.95); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around;
            padding: 10px 16px calc(10px + env(safe-area-inset-bottom, 0px));
            border-top: 1px solid rgba(220, 40, 40, 0.3);
            z-index: 1000;
        }
        .tab {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            background: none; border: none; font-size: 11px; font-weight: 500;
            color: rgba(255, 255, 255, 0.45); cursor: pointer; padding: 8px 12px;
            border-radius: 24px; transition: all 0.25s ease;
        }
        .tab.active { color: #e84545; background: rgba(232, 69, 69, 0.12); }
        .card, .menu-item, .promo-card, .booking-item, .admin-booking, .booking-card {
            background: linear-gradient(135deg, rgba(18, 18, 22, 0.95) 0%, rgba(12, 12, 16, 0.98) 100%);
            border-radius: 24px; padding: 20px; margin-bottom: 16px;
            border: 1px solid rgba(232, 69, 69, 0.25); transition: all 0.3s ease;
        }
        .card:hover, .menu-item:hover { transform: translateY(-3px); border-color: rgba(232, 69, 69, 0.6); }
        input, select, textarea {
            font-size: 16px; padding: 14px 16px; border-radius: 16px;
            border: 1.5px solid rgba(232, 69, 69, 0.2); background: rgba(5, 5, 7, 0.9);
            color: #ffffff; width: 100%; margin-bottom: 14px;
        }
        input:focus, textarea:focus { outline: none; border-color: #e84545; box-shadow: 0 0 0 3px rgba(232, 69, 69, 0.2); }
        input:read-only { opacity: 0.7; cursor: default; border-color: rgba(232, 69, 69, 0.3); }
        button {
            background: linear-gradient(135deg, #e84545 0%, #c92a2a 100%);
            color: #ffffff; border: none; font-weight: 600; cursor: pointer;
            font-size: 16px; padding: 14px 20px; border-radius: 16px;
            width: 100%; margin-bottom: 12px; transition: all 0.2s ease;
        }
        button:hover { transform: scale(0.98); box-shadow: 0 8px 24px rgba(232, 69, 69, 0.35); }
        .btn-secondary { background: linear-gradient(135deg, #3a3a45, #2a2a32); margin-bottom: 0; width: auto; padding: 10px 20px; }
        .btn-success { background: linear-gradient(135deg, #28a745, #1e6b3b); }
        .button-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }
        .restaurant-header h1 { font-size: 34px; font-weight: 800; background: linear-gradient(135deg, #ffffff, #e84545); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; }
        h2 { font-size: 22px; font-weight: 600; margin: 20px 0 16px 0; border-left: 3px solid #e84545; padding-left: 12px; }
        h3 { font-size: 18px; font-weight: 600; margin-bottom: 12px; color: #e84545; }
        .toast {
            position: fixed; bottom: 90px; left: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px);
            color: #e84545; padding: 14px 20px; border-radius: 60px;
            text-align: center; z-index: 2000; animation: fadeInOut 2.5s ease;
            border: 1px solid rgba(232, 69, 69, 0.4);
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.92); backdrop-filter: blur(16px);
            display: flex; align-items: center; justify-content: center; z-index: 3000;
        }
        .modal-content {
            background: linear-gradient(135deg, #121215, #0a0a0d);
            border-radius: 32px; padding: 28px; width: 90%; max-width: 500px;
            border: 1px solid rgba(232, 69, 69, 0.4);
        }
        label { font-size: 13px; font-weight: 500; margin-bottom: 6px; display: block; color: rgba(255, 255, 255, 0.7); }
        .scanner-container { text-align: center; margin-bottom: 20px; }
        video { width: 100%; max-width: 400px; border-radius: 24px; border: 2px solid #e84545; margin-bottom: 16px; background: #000; }
        .loading { text-align: center; padding: 60px; color: rgba(232, 69, 69, 0.6); }
        .info-text { color: rgba(255,255,255,0.6); font-size: 14px; text-align: center; margin-top: 10px; }
        .bonus-balance {
            font-size: 48px;
            font-weight: 800;
            text-align: center;
            color: #e84545;
            margin: 20px 0;
        }
        .bonus-update-btn {
            background: linear-gradient(135deg, #4a4a55, #3a3a45);
            margin-top: 10px;
        }
        .status-pending { color: #ffc107; }
        .status-confirmed { color: #28a745; }
        .menu-category {
            font-size: 20px;
            font-weight: 600;
            margin: 20px 0 10px 0;
            color: #e84545;
            border-bottom: 1px solid rgba(232, 69, 69, 0.3);
            padding-bottom: 5px;
        }
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-item {
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .history-date {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        .history-amount {
            color: #e84545;
            font-weight: 600;
        }
        .refresh-spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .card-info {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
    </style>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <div class="container" id="app">
        <div class="loading">⟡ ЗАГРУЗКА ПРЕМИУМ ОПЫТА ⟡</div>
    </div>

    <div class="tab-bar">
        <button class="tab" data-tab="booking">📅<span>СТОЛ</span></button>
        <button class="tab" data-tab="menu">📖<span>МЕНЮ</span></button>
        <button class="tab" data-tab="call">📷<span>ВЫЗОВ</span></button>
        <button class="tab" data-tab="bonus">🎁<span>КАРТА</span></button>
        <button class="tab" data-tab="promo">🔥<span>АКЦИИ</span></button>
        <button class="tab" data-tab="contacts">📞<span>КОНТАКТЫ</span></button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // ==================== НАСТРОЙКИ ====================
        const SHEET_API = "https://api.sheetbest.com/sheets/86b2770d-6921-43a6-ada0-a16dbd1ce54c";
        const USERS_API = "https://api.sheetbest.com/sheets/912a1d92-a006-4a4c-9085-7d6f3722e453";
        const ADMIN_IDS = [755574601];
        const BOT_TOKEN = "8696170529:AAGtVDCEntgnKdvgaEdQ44DZnnBORHjAyNM";
        const STAFF_CHAT_ID = "-1003809247932"; // Замените на ID чата для вызовов
        
        // ========== НАСТРОЙКИ FRONTPAD API ==========
        const FRONTPAD_SECRET = "AaQQTaGdtZzarNtd8DtDQBdA43T4d7tE77eQ8NTrAdsQSKSQaaeRBhds8ZfaSBEQzKstk9HKd4nYB7zB7DeyKhQH6YKNidnHQF44FBDHrSsSNReGfk5TyFrrr35D5f9GN4Afr3RGF8keQtQYFGD4aSfsG9TAeS6TGs32fFyQEGYe4z3z6sk69tkFt65AN2ehe78nDs463K9R83b4fnZeH8K45ErEszQAtKNY4EQRdQyaEz5KNRRiNrbFYs"; // ЗАМЕНИТЕ НА ВАШ РЕАЛЬНЫЙ КЛЮЧ!
        // ===================================================
        
        // Telegram WebApp
        let tg = window.Telegram?.WebApp;
        if (!tg || !tg.initDataUnsafe?.user?.id) {
            tg = {
                initDataUnsafe: { user: { id: 755574601, first_name: "Admin", username: "admin" } },
                ready: () => {},
                expand: () => {},
                close: () => {},
                HapticFeedback: { impactOccurred: () => {} },
                themeParams: { bg_color: "#0a0a0c", text_color: "#ffffff", button_color: "#e84545" }
            };
        }
        
        tg.expand();
        tg.ready();
        document.body.style.background = '#0a0a0c';
        
        const TELEGRAM_USER_ID = tg.initDataUnsafe.user.id;
        const TELEGRAM_USER_NAME = tg.initDataUnsafe.user.first_name || "Гость";
        const IS_ADMIN = ADMIN_IDS.includes(TELEGRAM_USER_ID);
        
        // ========== ФУНКЦИЯ ПОЛУЧЕНИЯ БОНУСОВ ИЗ FRONTPAD ==========
        async function getFrontpadScore(phone) {
            if (!phone) return null;
            
            // Очищаем номер: оставляем только цифры
            let cleanPhone = phone.replace(/\D/g, '');
            
            // Приводим к формату 7XXXXXXXXXX (11 цифр)
            if (cleanPhone.startsWith('8')) {
                cleanPhone = '7' + cleanPhone.substring(1);
            } else if (cleanPhone.startsWith('9') && cleanPhone.length === 10) {
                cleanPhone = '7' + cleanPhone;
            } else if (cleanPhone.startsWith('+7')) {
                cleanPhone = '7' + cleanPhone.substring(2);
            }
            
            // Проверяем, что номер корректный
            if (cleanPhone.length !== 11 || !cleanPhone.startsWith('7')) {
                console.warn('Некорректный формат номера:', cleanPhone);
                return null;
            }
            
            try {
                const url = "https://app.frontpad.ru/api/index.php?get_client";
                const formData = new URLSearchParams();
                formData.append('secret', FRONTPAD_SECRET);
                formData.append('client_phone', cleanPhone);
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData.toString()
                });
                
                const result = await response.json();
                console.log('FrontPad ответ:', result);
                
                if (result.result === 'success' && result.score !== undefined) {
                    return {
                        score: parseInt(result.score) || 0,
                        name: result.name || null,
                        card: result.card || null,
                        sale: result.sale || null
                    };
                } else {
                    console.warn('FrontPad ошибка:', result.error);
                    return null;
                }
            } catch (error) {
                console.error('Ошибка запроса к FrontPad:', error);
                return null;
            }
        }
        
        // ========== Регистрация ==========
        let userPhone = null;
        let userBirthday = null;
        let isRegistered = false;
        let frontpadData = null;
        
        function loadUserData() {
            const saved = localStorage.getItem(`huqqa_user_${TELEGRAM_USER_ID}`);
            if (saved) {
                const data = JSON.parse(saved);
                userPhone = data.phone;
                userBirthday = data.birthday;
                isRegistered = !!userPhone;
            }
        }
        
        async function saveUserDataToCloud(phone, birthday) {
            try {
                const response = await fetch(USERS_API);
                const users = await response.json();
                const existing = users.find(u => String(u.userId) === String(TELEGRAM_USER_ID));
                
                if (!existing) {
                    const newUser = {
                        id: Date.now().toString(),
                        userId: String(TELEGRAM_USER_ID),
                        name: TELEGRAM_USER_NAME,
                        phone: phone,
                        birthday: birthday,
                        registeredAt: new Date().toISOString(),
                        forceReauth: "false"
                    };
                    await fetch(USERS_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify([newUser])
                    });
                    addBonus("⟡ Регистрация в Huqqa Lounge ⟡", 300);
                    showToast("⟡ +300 бонусов за регистрацию! ⟡");
                } else if (existing.phone !== phone || existing.birthday !== birthday) {
                    await fetch(`${USERS_API}/id/${existing.id}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: phone, birthday: birthday })
                    });
                }
                
                userPhone = phone;
                userBirthday = birthday;
                isRegistered = true;
                localStorage.setItem(`huqqa_user_${TELEGRAM_USER_ID}`, JSON.stringify({
                    phone: phone,
                    birthday: birthday,
                    registeredAt: new Date().toISOString()
                }));
                
                // После сохранения номера - получаем бонусы из FrontPad
                await syncBonusesWithFrontpad();
                
                return true;
            } catch (error) {
                console.error("Ошибка:", error);
                return false;
            }
        }
        
        // ========== Синхронизация бонусов с FrontPad ==========
        async function syncBonusesWithFrontpad() {
            if (!userPhone) return null;
            
            const fpData = await getFrontpadScore(userPhone);
            if (fpData && fpData.score !== null) {
                frontpadData = fpData;
                // Обновляем локальный баланс из FrontPad
                if (userBonuses.balance !== fpData.score) {
                    userBonuses.balance = fpData.score;
                    // Добавляем запись в историю о синхронизации
                    userBonuses.history.unshift({
                        date: new Date().toLocaleString(),
                        reason: "Синхронизация с FrontPad",
                        amount: fpData.score
                    });
                    if (userBonuses.history.length > 20) userBonuses.history.pop();
                    saveBonuses();
                    localStorage.setItem(`huqqa_last_update_${TELEGRAM_USER_ID}`, Date.now().toString());
                    showToast(`🔄 Бонусы обновлены: ${fpData.score} баллов`);
                }
                return fpData;
            }
            return null;
        }
        
        // ========== Функции бонусов ==========
        let userBonuses = { balance: 0, history: [] };
        function loadBonuses() {
            const saved = localStorage.getItem(`huqqa_bonuses_${TELEGRAM_USER_ID}`);
            if (saved) userBonuses = JSON.parse(saved);
            else { userBonuses = { balance: 0, history: [] }; saveBonuses(); }
        }
        function saveBonuses() { localStorage.setItem(`huqqa_bonuses_${TELEGRAM_USER_ID}`, JSON.stringify(userBonuses)); }
        function addBonus(reason, amount) {
            userBonuses.balance += amount;
            userBonuses.history.unshift({ date: new Date().toLocaleString(), reason: reason, amount: amount });
            if (userBonuses.history.length > 20) userBonuses.history.pop();
            saveBonuses();
        }
        
        let bookings = [];
        async function loadBookings() {
            try {
                const response = await fetch(SHEET_API);
                bookings = await response.json();
                return bookings;
            } catch { bookings = []; return []; }
        }
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.style.background = isError ? 'rgba(30, 0, 0, 0.95)' : 'rgba(0, 0, 0, 0.95)';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        // ========== ВЫЗОВ КАЛЬЯНЩИКА ПО QR-КОДУ ==========
        let html5QrCode = null;
        
        async function startScanner() {
            const scannerContainer = document.createElement('div');
            scannerContainer.className = 'modal';
            scannerContainer.id = 'scannerModal';
            scannerContainer.innerHTML = `
                <div class="modal-content" style="text-align: center;">
                    <h3>📷 НАВЕДИТЕ НА QR-КОД</h3>
                    <div id="qr-reader" style="width: 100%; margin: 0 auto;"></div>
                    <div class="info-text">Код должен быть в формате: <strong>Huqqa-XXX</strong><br>(где XXX — номер стола)</div>
                    <div class="button-group" style="margin-top: 20px;">
                        <button id="closeScannerBtn" class="btn-secondary">❌ ОТМЕНА</button>
                    </div>
                </div>
            `;
            document.body.appendChild(scannerContainer);
            
            html5QrCode = new Html5Qrcode("qr-reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            try {
                await html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                    html5QrCode.stop().catch(err => console.log(err));
                    scannerContainer.remove();
                    
                    if (decodedText.startsWith("Huqqa-")) {
                        const tableNumber = decodedText.replace("Huqqa-", "");
                        if (tableNumber && !isNaN(parseInt(tableNumber))) {
                            showCallForm(tableNumber);
                        } else {
                            showToast("❌ Неверный формат QR-кода. Номер стола должен быть числом.", true);
                        }
                    } else {
                        showToast("❌ Неверный QR-код. Должен начинаться с 'Huqqa-'", true);
                    }
                }, (error) => {});
            } catch (err) {
                console.error("Ошибка запуска камеры:", err);
                showToast("❌ Не удалось получить доступ к камере. Проверьте разрешения.", true);
                scannerContainer.remove();
            }
            
            document.getElementById('closeScannerBtn').addEventListener('click', () => {
                if (html5QrCode && html5QrCode.isScanning) {
                    html5QrCode.stop().catch(err => console.log(err));
                }
                scannerContainer.remove();
            });
        }
        
        function showCallForm(tableNumber) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>📢 ВЫЗОВ КАЛЬЯНЩИКА</h3>
                    <label>🍽️ НОМЕР СТОЛА (НЕ РЕДАКТИРУЕТСЯ)</label>
                    <input type="text" id="callTableNumber" value="${tableNumber}" readonly>
                    
                    <label>💬 СООБЩЕНИЕ (ОПЦИОНАЛЬНО)</label>
                    <textarea id="callMessage" rows="3" placeholder="Например: Принесите дополнительный уголь, фрукт на кальян..." style="resize: vertical;"></textarea>
                    
                    <div class="button-group">
                        <button id="sendCallBtn" class="btn-success">📤 ОТПРАВИТЬ ВЫЗОВ</button>
                        <button id="closeCallBtn" class="btn-secondary">ОТМЕНА</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('sendCallBtn').addEventListener('click', async () => {
                const table = document.getElementById('callTableNumber').value;
                const message = document.getElementById('callMessage').value;
                const userName = TELEGRAM_USER_NAME;
                const userPhoneNumber = userPhone || "Не указан";
                const userBonusesBalance = userBonuses.balance;
                
                const staffMessage = `🆘 *ВЫЗОВ КАЛЬЯНЩИКА* 🆘\n\n` +
                    `👤 *Гость:* ${userName}\n` +
                    `📞 *Телефон:* ${userPhoneNumber}\n` +
                    `🎁 *Бонусов:* ${userBonusesBalance}\n` +
                    `🍽️ *Стол №:* ${table}\n` +
                    `💬 *Сообщение:* ${message || "—"}\n` +
                    `🕐 *Время вызова:* ${new Date().toLocaleString()}\n\n` +
                    `_Для обработки вызова подойдите к столу_`;
                
                try {
                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: STAFF_CHAT_ID,
                            text: staffMessage,
                            parse_mode: 'Markdown'
                        })
                    });
                    
                    if (response.ok) {
                        showToast("✅ Вызов успешно отправлен! Кальянщик скоро подойдёт.");
                        modal.remove();
                    } else {
                        showToast("❌ Ошибка отправки. Попробуйте позже.", true);
                    }
                } catch (error) {
                    console.error(error);
                    showToast("❌ Ошибка отправки. Проверьте соединение.", true);
                }
            });
            
            document.getElementById('closeCallBtn').addEventListener('click', () => {
                modal.remove();
            });
        }
        
        // ========== Вкладка "Вызов" ==========
        async function renderCall() {
            const html = `
                <div class="restaurant-header">
                    <h1>📷 ВЫЗОВ КАЛЬЯНЩИКА</h1>
                    <p style="opacity:0.7;">Отсканируйте QR-код на вашем столе</p>
                </div>
                <div class="card" style="text-align: center;">
                    <div style="font-size: 64px; margin-bottom: 20px;">📷</div>
                    <button id="scanQrBtn" style="background: linear-gradient(135deg, #e84545, #c92a2a); margin-bottom: 0;">🔍 СКАНИРОВАТЬ QR-КОД</button>
                    <p class="info-text" style="margin-top: 20px;">Код начинается с <strong>Huqqa-</strong>, затем номер стола</p>
                    <p class="info-text">После сканирования вы сможете отправить сообщение кальянщику</p>
                </div>
            `;
            document.getElementById('app').innerHTML = html;
            
            document.getElementById('scanQrBtn').addEventListener('click', () => {
                startScanner();
            });
        }
        
        // ========== Вкладка бронирования ==========
        async function renderBooking() {
            await loadBookings();
            const myActiveBookings = bookings.filter(b => String(b.userId) === String(TELEGRAM_USER_ID) && !isBookingExpired(b));
            const html = `
                <div class="restaurant-header"><h1>⟡ HUQQA LOUNGE ⟡</h1><p style="opacity:0.6;">ЗАБРОНИРУЙТЕ СТОЛИК</p></div>
                <div class="card">
                    <label>👤 ВАШЕ ИМЯ</label><input type="text" id="name" value="${TELEGRAM_USER_NAME}">
                    <label>📞 ТЕЛЕФОН</label><input type="tel" id="phone" value="${userPhone || ''}" ${userPhone ? 'readonly' : ''}>
                    <label>📅 ДАТА</label><input type="date" id="date" min="${new Date().toISOString().split('T')[0]}">
                    <label>⏰ ВРЕМЯ</label><input type="time" id="time">
                    <label>👥 ГОСТЕЙ</label><input type="number" id="guests" min="1" max="10" value="2">
                    <button id="submitBookingBtn">⟡ ЗАБРОНИРОВАТЬ СТОЛ ⟡</button>
                </div>
                <h3>📋 МОИ БРОНИРОВАНИЯ</h3>
                ${myActiveBookings.length === 0 ? '<p style="opacity:0.5;">У вас нет активных броней</p>' : 
                    myActiveBookings.map(b => `<div class="booking-card"><strong>${b.date} в ${b.time}</strong><br>ГОСТЕЙ: ${b.guests} | СТАТУС: ${b.status === 'pending' ? '<span class="status-pending">ОЖИДАЕТ</span>' : '<span class="status-confirmed">ПОДТВЕРЖДЕНО</span>'}</div>`).join('')}
            `;
            document.getElementById('app').innerHTML = html;
            document.getElementById('submitBookingBtn')?.addEventListener('click', async () => {
                const name = document.getElementById('name').value;
                const phone = document.getElementById('phone').value;
                const date = document.getElementById('date').value;
                const time = document.getElementById('time').value;
                const guests = parseInt(document.getElementById('guests').value);
                if (!name || !phone || !date || !time) { showToast("Заполните все поля", true); return; }
                const newBooking = { userId: String(TELEGRAM_USER_ID), name, phone, date, time, guests, status: 'pending' };
                const saved = await saveBooking(newBooking);
                if (saved) { await sendNotificationToAdmins(newBooking); showToast(`✅ Стол забронирован!`); setTimeout(() => renderBooking(), 1000); }
            });
        }
        
        function isBookingExpired(booking) {
            if (!booking.date || !booking.time) return false;
            const bookingDateTime = new Date(`${booking.date}T${booking.time}`);
            const now = new Date();
            const hoursDiff = (now - bookingDateTime) / (1000 * 60 * 60);
            return hoursDiff > 24;
        }
        
        async function saveBooking(booking) {
            try {
                booking.id = Date.now().toString();
                booking.created_at = new Date().toISOString();
                booking.phone = userPhone || booking.phone;
                const response = await fetch(SHEET_API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify([booking]) });
                return response.ok ? booking : null;
            } catch { showToast("Ошибка сохранения!", true); return null; }
        }
        
        async function sendNotificationToAdmins(booking) {
            const adminIds = ADMIN_IDS;
            const message = `🆕 *НОВАЯ БРОНЬ!*\n👤 ${booking.name}\n📞 ${booking.phone}\n📅 ${booking.date} ${booking.time}\n👥 ${booking.guests} чел.`;
            for (const adminId of adminIds) {
                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: adminId, text: message, parse_mode: 'Markdown' }) });
                } catch (error) {}
            }
        }
        
        // ========== Вкладка меню ==========
        function renderMenu() {
            const menuItems = [
                { name: "Бизнес кальян (Пн-Пт 12:00-17:00)", price: 1500, category: "Кальяны" },
                { name: "Кальян на классической чаше", price: 1700, category: "Кальяны" },
                { name: "Премиум кальян с сигарным листом", price: 1900, category: "Кальяны" },
                { name: "Авторский кальян на цитрусовый", price: 2500, category: "Кальяны" },
                { name: "Энергетик RedBull", price: 300, category: "Напитки" },
                { name: "Лимонад Star Bar Craft", price: 350, category: "Напитки" },
                { name: "Пиво Корона Экстра", price: 400, category: "Напитки" },
                { name: "Авторский Банановый Улун", price: 600, category: "Чаи" },
                { name: "Эспрессо", price: 150, category: "Кофе" },
                { name: "СуперМясная пицца", price: 1000, category: "Пиццы" },
                { name: "Апельсин/Грейпфрут", price: 150, category: "Добавки" }
            ];
            let html = `<h2>📖 НАШЕ МЕНЮ</h2>`;
            const categories = [...new Set(menuItems.map(i => i.category))];
            categories.forEach(cat => {
                html += `<div class="menu-category">${cat}</div>`;
                menuItems.filter(i => i.category === cat).forEach(item => { html += `<div class="menu-item"><strong>${item.name}</strong> <span>${item.price} ₽</span></div>`; });
            });
            document.getElementById('app').innerHTML = html;
        }
        
        // ========== Вкладка бонусов (с автоматическим обновлением) ==========
        async function renderBonus() {
            // Показываем индикатор загрузки
            document.getElementById('app').innerHTML = `
                <div style="text-align: center; padding: 60px;">
                    <div style="font-size: 40px; margin-bottom: 16px;">🔄</div>
                    <div>Загрузка бонусов...</div>
                </div>
            `;
            
            // Автоматически обновляем бонусы при открытии вкладки
            await syncBonusesWithFrontpad();
            
            const balanceInRubles = (userBonuses.balance / 2).toFixed(0);
            const lastUpdateTime = localStorage.getItem(`huqqa_last_update_${TELEGRAM_USER_ID}`);
            const updateInfo = lastUpdateTime ? `<div class="card-info">
                Последнее обновление: ${new Date(parseInt(lastUpdateTime)).toLocaleString()}
            </div>` : '';
            
            const fpInfo = frontpadData ? `
                <div class="card-info">
                    🎫 Карта: ${frontpadData.card || '—'} | 💳 Скидка: ${frontpadData.sale || '0'}%
                </div>
            ` : '';
            
            const html = `
                <h2>🎁 МОЯ КАРТА ГОСТЯ</h2>
                <div class="card">
                    <h3>💰 БОНУСНЫЙ БАЛАНС</h3>
                    <div class="bonus-balance">${userBonuses.balance}</div>
                    <p style="text-align: center;">100 бонусов = 50₽ скидка</p>
                    <p style="text-align: center; font-size: 18px; font-weight: 600;">≈ ${balanceInRubles} ₽ кэшбэка</p>
                    ${fpInfo}
                    ${updateInfo}
                    <button id="syncBonusesBtn" class="bonus-update-btn">🔄 ОБНОВИТЬ БОНУСЫ</button>
                </div>
                <div class="card">
                    <h3>📜 ИСТОРИЯ ОПЕРАЦИЙ</h3>
                    ${userBonuses.history.length === 0 ? '<p style="text-align: center; opacity: 0.6;">Пока нет операций</p>' : 
                        userBonuses.history.slice(0, 10).map(h => `
                            <div class="history-item">
                                <div class="history-date">${h.date}</div>
                                <div><span class="history-amount">${h.amount > 0 ? '+' : ''}${h.amount}</span> — ${h.reason}</div>
                            </div>
                        `).join('')}
                </div>
            `;
            document.getElementById('app').innerHTML = html;
            
            document.getElementById('syncBonusesBtn')?.addEventListener('click', async () => {
                const btn = document.getElementById('syncBonusesBtn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '🔄 СИНХРОНИЗАЦИЯ...';
                btn.disabled = true;
                
                const result = await syncBonusesWithFrontpad();
                if (result && result.score !== null) {
                    await renderBonus();
                    showToast(`✅ Бонусы обновлены: ${result.score} баллов`);
                } else {
                    showToast("❌ Не удалось синхронизировать бонусы. Проверьте номер телефона в системе FrontPad.", true);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            });
        }
        
        // ========== Вкладка акций ==========
        function renderPromo() {
            const promos = [
                { name: "🕒 СЧАСТЛИВЫЕ ЧАСЫ", desc: "Пн-Пт с 12:00 до 17:00. Кальян 1500₽!", code: "HAPPY1500" },
                { name: "🎂 ДЕНЬ РОЖДЕНИЯ", desc: "Скидка 20% на весь счёт", discount: 20, code: "BIRTHDAY20" },
                { name: "🎁 БОНУС ЗА ОТЗЫВ", desc: "Оставьте отзыв и получите 200 бонусов", code: "REVIEW200" }
            ];
            const html = `<h2>🔥 АКЦИИ</h2>${promos.map(p => `<div class="promo-card"><strong>${p.name}</strong><br>${p.desc}<br><button class="copyPromoBtn" data-code="${p.code}">📋 КОД: ${p.code}</button></div>`).join('')}`;
            document.getElementById('app').innerHTML = html;
            document.querySelectorAll('.copyPromoBtn').forEach(btn => { btn.addEventListener('click', () => { navigator.clipboard.writeText(btn.dataset.code); showToast(`✅ Код скопирован`); }); });
        }
        
        // ========== Вкладка контактов ==========
        function renderContacts() {
            const html = `<h2>📞 КОНТАКТЫ</h2>
                <div class="card">
                    <p>📍 ул. Молодежная 15Б, Химки</p>
                    <p>📞 <a href="tel:+79099846677" style="color:#e84545; text-decoration: none;">+7 (909) 984-66-77</a></p>
                    <p>📱 <a href="https://t.me/huqqa_lounge" style="color:#e84545; text-decoration: none;">@huqqa_lounge</a></p>
                    <p>🕒 Вс-Чт: 12:00 – 02:00</p>
                    <p>🕒 Пт-Сб: 12:00 – 03:00</p>
                </div>
                <div class="card">
                    <h3>🏆 СТАТУС ГОСТЯ</h3>
                    <p style="text-align: center;">${userBonuses.balance >= 1000 ? '💎 ПЛАТИНОВЫЙ' : userBonuses.balance >= 500 ? '✨ ЗОЛОТОЙ' : userBonuses.balance >= 100 ? '⭐ СЕРЕБРЯНЫЙ' : '🌿 НАЧИНАЮЩИЙ'}</p>
                    <p style="text-align: center; font-size: 12px; opacity: 0.6;">
                        ${userBonuses.balance >= 1000 ? 'VIP-обслуживание и отдельная зона' : userBonuses.balance >= 500 ? 'Приоритетное бронирование' : userBonuses.balance >= 100 ? 'Накопительная скидка 5%' : 'Копите бонусы для повышения статуса!'}
                    </p>
                </div>`;
            document.getElementById('app').innerHTML = html;
        }
        
        // ========== Админ-панель ==========
        async function renderAdmin() {
            await loadBookings();
            const pendingBookings = bookings.filter(b => b.status === 'pending');
            const confirmedBookings = bookings.filter(b => b.status === 'confirmed');
            
            const html = `
                <h2>👑 АДМИН-ПАНЕЛЬ</h2>
                <div class="card">
                    <h3>📋 НОВЫЕ БРОНИ (${pendingBookings.length})</h3>
                    ${pendingBookings.length === 0 ? '<p>Нет новых броней</p>' : 
                        pendingBookings.map(b => `
                            <div class="booking-card">
                                <strong>${b.name}</strong><br>
                                📞 ${b.phone}<br>
                                📅 ${b.date} в ${b.time}<br>
                                👥 ${b.guests} чел.<br>
                                <div class="button-group" style="margin-top: 10px;">
                                    <button class="confirmBookingBtn" data-id="${b.id}">✅ ПОДТВЕРДИТЬ</button>
                                    <button class="cancelBookingBtn" data-id="${b.id}">❌ ОТМЕНИТЬ</button>
                                </div>
                            </div>
                        `).join('')}
                </div>
            `;
            document.getElementById('app').innerHTML = html;
            
            document.querySelectorAll('.confirmBookingBtn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.id;
                    await updateBookingStatus(id, 'confirmed');
                    showToast("✅ Бронь подтверждена");
                    renderAdmin();
                });
            });
            
            document.querySelectorAll('.cancelBookingBtn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.id;
                    await updateBookingStatus(id, 'cancelled');
                    showToast("❌ Бронь отклонена");
                    renderAdmin();
                });
            });
        }
        
        async function updateBookingStatus(id, status) {
            const booking = bookings.find(b => b.id === id);
            if (booking) {
                booking.status = status;
                try {
                    await fetch(SHEET_API, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(bookings) });
                } catch (error) {}
            }
        }
        
        // ========== Роутинг и регистрация ==========
        let currentTab = "booking";
        
        async function renderCurrentTab() {
            if (!isRegistered) { await showPhoneRegistrationModal(); renderCurrentTab(); return; }
            if (currentTab === 'booking') await renderBooking();
            else if (currentTab === 'menu') renderMenu();
            else if (currentTab === 'call') await renderCall();
            else if (currentTab === 'bonus') await renderBonus();
            else if (currentTab === 'promo') renderPromo();
            else if (currentTab === 'contacts') renderContacts();
            else if (currentTab === 'admin' && IS_ADMIN) await renderAdmin();
            else await renderBooking();
        }
        
        function showPhoneRegistrationModal() {
            return new Promise((resolve) => {
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3>⟡ HUQQA LOUNGE ⟡</h3>
                        <p style="text-align:center;">Укажите ваши данные для входа</p>
                        <p style="text-align:center; color:#e84545;">🎁 +300 БОНУСОВ ЗА РЕГИСТРАЦИЮ</p>
                        <label>📞 ТЕЛЕФОН</label>
                        <input type="tel" id="phoneInput" placeholder="+7 (XXX) XXX-XX-XX">
                        <label>🎂 ДАТА РОЖДЕНИЯ</label>
                        <input type="date" id="birthdayInput" max="${new Date().toISOString().split('T')[0]}">
                        <label>👤 ВАШЕ ИМЯ</label>
                        <input type="text" id="nameInput" value="${TELEGRAM_USER_NAME}" readonly disabled>
                        <div class="button-group">
                            <button id="savePhoneBtn">⟡ ПРОДОЛЖИТЬ ⟡</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                document.getElementById('savePhoneBtn')?.addEventListener('click', async () => {
                    const phone = document.getElementById('phoneInput').value.trim();
                    const birthday = document.getElementById('birthdayInput').value;
                    if (!phone || !birthday) { showToast("Заполните все поля", true); return; }
                    await saveUserDataToCloud(phone, birthday);
                    modal.remove();
                    resolve(true);
                });
            });
        }
        
        function setupTabs() {
            const tabBar = document.querySelector('.tab-bar');
            if (IS_ADMIN && !document.querySelector('.tab[data-tab="admin"]')) {
                const adminTab = document.createElement('button');
                adminTab.className = 'tab';
                adminTab.setAttribute('data-tab', 'admin');
                adminTab.innerHTML = '👑<span>АДМИН</span>';
                tabBar.appendChild(adminTab);
            }
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    currentTab = tab.dataset.tab;
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    renderCurrentTab();
                });
            });
        }
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        loadUserData();
        loadBonuses();
        
        // Если пользователь уже зарегистрирован - синхронизируем бонусы с FrontPad
        if (isRegistered && userPhone) {
            syncBonusesWithFrontpad().then(() => {
                setupTabs();
                document.querySelector('.tab').classList.add('active');
                renderCurrentTab();
            });
        } else {
            setupTabs();
            document.querySelector('.tab').classList.add('active');
            renderCurrentTab();
        }
    </script>
</body>
</html>
