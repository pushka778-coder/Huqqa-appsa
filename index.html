<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Huqqa Restaurant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding-bottom: 70px;
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            padding-top: env(safe-area-inset-top, 16px);
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 8px 8px calc(8px + env(safe-area-inset-bottom, 0px));
            border-top: 1px solid var(--tg-theme-hint-color, #ccc);
            z-index: 1000;
        }

        .tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #999);
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 12px;
        }

        .tab.active {
            color: var(--tg-theme-button-color, #31b545);
        }

        .card, .menu-item, .promo-card, .booking-item, .admin-booking {
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        button, input, select {
            font-size: 16px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            background: var(--tg-theme-bg-color, white);
            color: var(--tg-theme-text-color, black);
            width: 100%;
            margin-bottom: 12px;
        }

        button {
            background: var(--tg-theme-button-color, #31b545);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .confirm-btn {
            background: #28a745;
            margin-right: 8px;
            width: auto;
            padding: 8px 16px;
        }

        .cancel-btn {
            background: #dc3545;
            width: auto;
            padding: 8px 16px;
        }

        .bonus-balance {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            background: linear-gradient(135deg, gold, orange);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .loyalty-badge {
            text-align: center;
            padding: 8px;
            border-radius: 20px;
            background: var(--tg-theme-button-color, #31b545);
            color: white;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            z-index: 2000;
            animation: fadeInOut 2s ease;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        .restaurant-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .restaurant-header h1 {
            font-size: 28px;
            color: var(--tg-theme-button-color, #31b545);
        }

        .admin-panel {
            background: #ff9800;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .status-pending {
            color: #ff9800;
            font-weight: bold;
        }

        .status-confirmed {
            color: #28a745;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #999);
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading">⏳ Загрузка...</div>
    </div>

    <div class="tab-bar">
        <button class="tab" data-tab="booking">📅<span>Стол</span></button>
        <button class="tab" data-tab="menu">📖<span>Меню</span></button>
        <button class="tab" data-tab="bonus">🎁<span>Бонусы</span></button>
        <button class="tab" data-tab="promo">🔥<span>Акции</span></button>
        <button class="tab" data-tab="contacts">📞<span>Контакты</span></button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // ==================== НАСТРОЙКИ ====================
        // Бесплатный API на MockAPI.io (замени после регистрации)
        // РЕГИСТРАЦИЯ: https://mockapi.io → Create project → New Resource "bookings"
        const API_BASE = "https://66e9e2db87e417609448233b.mockapi.io/api";
        const ADMIN_IDS = [755574601];  // ТВОЙ ID
        
        // ===================================================
        
        // --- Инициализация Telegram ---
        let tg = window.Telegram?.WebApp;
        if (!tg || !tg.initDataUnsafe?.user?.id) {
            tg = {
                initDataUnsafe: { user: { id: 999888777, first_name: "Гость", username: "guest" } },
                ready: () => {},
                expand: () => {},
                close: () => {},
                HapticFeedback: { impactOccurred: () => {} },
                themeParams: { bg_color: "#ffffff", text_color: "#000000", button_color: "#31b545" }
            };
        }
        
        tg.expand();
        tg.ready();
        document.body.style.background = tg.themeParams.bg_color || '#ffffff';
        
        const TELEGRAM_USER_ID = tg.initDataUnsafe.user.id;
        const TELEGRAM_USER_NAME = tg.initDataUnsafe.user.first_name || "Гость";
        const IS_ADMIN = ADMIN_IDS.includes(TELEGRAM_USER_ID);
        
        // --- Данные приложения ---
        let appData = {
            bookings: [],
            bonuses: {},
            bonusHistory: {},
            menu: [
                { id: 1, name: "🥗 Цезарь с креветками", desc: "Салат, креветки, пармезан", price: 590, category: "Салаты" },
                { id: 2, name: "🍲 Борщ с пампушками", desc: "Классический украинский борщ", price: 390, category: "Супы" },
                { id: 3, name: "🥩 Рибай стейк", desc: "Мраморная говядина", price: 1890, category: "Горячее" },
                { id: 4, name: "🍕 Маргарита", desc: "Томатный соус, моцарелла", price: 650, category: "Пицца" },
                { id: 5, name: "🍣 Филадельфия", desc: "Лосось, сливочный сыр", price: 750, category: "Роллы" },
                { id: 6, name: "🥤 Домашний лимонад", desc: "Имбирь, мята, лайм", price: 250, category: "Напитки" }
            ],
            promos: [
                { id: 1, name: "🎉 Welcome бонус", desc: "Скидка 20% на первый заказ", discount: 20, code: "WELCOME20" },
                { id: 2, name: "🍺 Счастливый час", desc: "Скидка 15% с 15:00 до 17:00", discount: 15, code: "HAPPY15" },
                { id: 3, name: "🎂 День рождения", desc: "Именинникам скидка 25%", discount: 25, code: "BIRTHDAY25" }
            ]
        };
        
        // --- Работа с облачным API (MockAPI) ---
        async function loadBookingsFromCloud() {
            try {
                const response = await fetch(`${API_BASE}/bookings`);
                if (!response.ok) throw new Error('Ошибка загрузки');
                const bookings = await response.json();
                appData.bookings = bookings;
                console.log("📦 Загружено броней из облака:", bookings.length);
                return bookings;
            } catch (error) {
                console.error("Ошибка загрузки броней:", error);
                // Если облако не работает, используем локальное хранилище как запасной вариант
                const saved = localStorage.getItem(`huqqa_bookings_backup`);
                if (saved) appData.bookings = JSON.parse(saved);
                return appData.bookings;
            }
        }
        
        async function saveBookingToCloud(booking) {
            try {
                const response = await fetch(`${API_BASE}/bookings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(booking)
                });
                if (!response.ok) throw new Error('Ошибка сохранения');
                const newBooking = await response.json();
                console.log("💾 Бронь сохранена в облаке:", newBooking);
                return newBooking;
            } catch (error) {
                console.error("Ошибка сохранения в облако:", error);
                return booking;
            }
        }
        
        async function updateBookingInCloud(bookingId, updatedData) {
            try {
                const response = await fetch(`${API_BASE}/bookings/${bookingId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                });
                if (!response.ok) throw new Error('Ошибка обновления');
                const updated = await response.json();
                console.log("✏️ Бронь обновлена в облаке:", updated);
                return updated;
            } catch (error) {
                console.error("Ошибка обновления:", error);
                return updatedData;
            }
        }
        
        async function deleteBookingFromCloud(bookingId) {
            try {
                await fetch(`${API_BASE}/bookings/${bookingId}`, { method: 'DELETE' });
                console.log("🗑️ Бронь удалена из облака:", bookingId);
                return true;
            } catch (error) {
                console.error("Ошибка удаления:", error);
                return false;
            }
        }
        
        // --- Бонусы (хранятся в localStorage, т.к. это персональные данные) ---
        function loadBonuses() {
            const saved = localStorage.getItem(`huqqa_bonuses_${TELEGRAM_USER_ID}`);
            if (saved) {
                const data = JSON.parse(saved);
                appData.bonuses[TELEGRAM_USER_ID] = data.balance || 100;
                appData.bonusHistory[TELEGRAM_USER_ID] = data.history || [];
            }
            if (!appData.bonuses[TELEGRAM_USER_ID]) {
                appData.bonuses[TELEGRAM_USER_ID] = 100;
                appData.bonusHistory[TELEGRAM_USER_ID] = [];
                addBonusHistory(TELEGRAM_USER_ID, "Регистрация", 100);
            }
            saveBonuses();
        }
        
        function saveBonuses() {
            const data = {
                balance: appData.bonuses[TELEGRAM_USER_ID],
                history: appData.bonusHistory[TELEGRAM_USER_ID]
            };
            localStorage.setItem(`huqqa_bonuses_${TELEGRAM_USER_ID}`, JSON.stringify(data));
        }
        
        function addBonusHistory(userId, reason, amount) {
            if (!appData.bonusHistory[userId]) appData.bonusHistory[userId] = [];
            appData.bonusHistory[userId].unshift({
                date: new Date().toLocaleString(),
                reason: reason,
                amount: amount
            });
            if (appData.bonusHistory[userId].length > 10) appData.bonusHistory[userId].pop();
        }
        
        function addBonus(userId, reason, amount) {
            if (!appData.bonuses[userId]) appData.bonuses[userId] = 0;
            appData.bonuses[userId] += amount;
            addBonusHistory(userId, reason, amount);
            saveBonuses();
        }
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.style.background = isError ? 'rgba(220, 50, 50, 0.95)' : 'rgba(0,0,0,0.85)';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        // --- АДМИН-ПАНЕЛЬ (видит ВСЕ брони из облака) ---
        async function renderAdminPanel() {
            await loadBookingsFromCloud();
            
            const pendingBookings = appData.bookings.filter(b => b.status === 'pending');
            const confirmedBookings = appData.bookings.filter(b => b.status === 'confirmed');
            
            let html = `
                <div class="restaurant-header">
                    <h1>👑 Админ-панель</h1>
                    <div class="admin-panel">Вы вошли как администратор | ID: ${TELEGRAM_USER_ID}</div>
                    <p style="font-size:12px; margin-top:5px;">📊 Всего броней: ${appData.bookings.length}</p>
                </div>
            `;
            
            html += `<h2>⏳ Ожидают подтверждения (${pendingBookings.length})</h2>`;
            if (pendingBookings.length === 0) {
                html += `<p>✨ Нет новых броней</p>`;
            } else {
                pendingBookings.forEach(b => {
                    html += `
                        <div class="admin-booking" data-id="${b.id}">
                            <strong>👤 ${b.name}</strong><br>
                            📞 ${b.phone}<br>
                            📅 ${b.date} в ${b.time}<br>
                            👥 ${b.guests} гостей<br>
                            🆔 TG ID: ${b.userId}<br>
                            <span class="status-pending">⏳ Статус: Ожидает</span>
                            <div class="button-group">
                                <button class="confirm-btn" data-id="${b.id}">✅ Подтвердить</button>
                                <button class="cancel-btn" data-id="${b.id}">❌ Отменить</button>
                            </div>
                        </div>
                    `;
                });
            }
            
            html += `<h2>✅ Подтверждённые брони (${confirmedBookings.length})</h2>`;
            if (confirmedBookings.length === 0) {
                html += `<p>Нет подтверждённых броней</p>`;
            } else {
                confirmedBookings.forEach(b => {
                    html += `
                        <div class="admin-booking">
                            <strong>👤 ${b.name}</strong><br>
                            📞 ${b.phone}<br>
                            📅 ${b.date} в ${b.time}<br>
                            👥 ${b.guests} гостей<br>
                            <span class="status-confirmed">✅ Статус: Подтверждено</span>
                        </div>
                    `;
                });
            }
            
            document.getElementById('app').innerHTML = html;
            
            // Обработчики для кнопок
            document.querySelectorAll('.confirm-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const bookingId = btn.dataset.id;
                    const booking = appData.bookings.find(b => b.id == bookingId);
                    if (booking) {
                        booking.status = 'confirmed';
                        await updateBookingInCloud(bookingId, booking);
                        showToast(`✅ Бронь #${bookingId.substring(0,8)} подтверждена!`);
                        renderAdminPanel();
                    }
                });
            });
            
            document.querySelectorAll('.cancel-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const bookingId = btn.dataset.id;
                    await deleteBookingFromCloud(bookingId);
                    appData.bookings = appData.bookings.filter(b => b.id != bookingId);
                    showToast(`❌ Бронь удалена`);
                    renderAdminPanel();
                });
            });
        }
        
        // --- Бронирование стола (сохраняется в облако) ---
        async function renderBooking() {
            await loadBookingsFromCloud();
            const myBookings = appData.bookings.filter(b => b.userId == TELEGRAM_USER_ID);
            
            const html = `
                <div class="restaurant-header">
                    <h1>🍽️ Huqqa Restaurant</h1>
                    <p>Забронируй стол и получи +50 бонусов</p>
                </div>
                <div class="card">
                    <input type="text" id="name" placeholder="Ваше имя" value="${TELEGRAM_USER_NAME}">
                    <input type="tel" id="phone" placeholder="Телефон" required>
                    <input type="date" id="date" min="${new Date().toISOString().split('T')[0]}">
                    <input type="time" id="time">
                    <input type="number" id="guests" placeholder="Кол-во гостей" min="1" max="10" value="2">
                    <button id="submitBookingBtn">✅ Забронировать (+50 бонусов)</button>
                </div>
                <h3>📋 Мои бронирования</h3>
                ${myBookings.length === 0 ? '<p>Пока нет броней</p>' : 
                    myBookings.map(b => `
                        <div class="booking-item">
                            <strong>${b.date} в ${b.time}</strong><br>
                            Гостей: ${b.guests} | Статус: ${b.status === 'pending' ? '<span class="status-pending">⏳ Ожидает</span>' : '<span class="status-confirmed">✅ Подтверждено</span>'}
                        </div>
                    `).join('')
                }
            `;
            document.getElementById('app').innerHTML = html;
            
            document.getElementById('submitBookingBtn')?.addEventListener('click', async () => {
                const phone = document.getElementById('phone').value;
                const date = document.getElementById('date').value;
                const time = document.getElementById('time').value;
                const guests = parseInt(document.getElementById('guests').value);
                
                if (!phone || !date || !time) {
                    showToast('Заполните телефон, дату и время', true);
                    return;
                }
                
                const newBooking = {
                    userId: TELEGRAM_USER_ID,
                    name: TELEGRAM_USER_NAME,
                    phone: phone,
                    date: date,
                    time: time,
                    guests: guests,
                    status: 'pending',
                    created_at: new Date().toISOString()
                };
                
                const saved = await saveBookingToCloud(newBooking);
                appData.bookings.push(saved);
                addBonus(TELEGRAM_USER_ID, `Бронь стола на ${date} ${time}`, 50);
                showToast(`✅ Стол забронирован! +50 бонусов`);
                setTimeout(() => renderBooking(), 1000);
            });
        }
        
        // --- Остальные вкладки (меню, бонусы, акции, контакты) ---
        function renderMenu() {
            const categories = [...new Set(appData.menu.map(item => item.category))];
            let html = `<h2>📖 Наше меню</h2>`;
            categories.forEach(cat => {
                html += `<h3>${cat}</h3>`;
                const items = appData.menu.filter(item => item.category === cat);
                items.forEach(item => {
                    html += `
                        <div class="menu-item">
                            <strong>${item.name}</strong> — ${item.price} ₽<br>
                            <small>${item.desc}</small><br>
                            <button class="likeBtn" data-id="${item.id}" data-name="${item.name}">❤️ Лайк (+5 бонусов)</button>
                        </div>
                    `;
                });
            });
            document.getElementById('app').innerHTML = html;
            document.querySelectorAll('.likeBtn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const itemName = e.target.dataset.name;
                    addBonus(TELEGRAM_USER_ID, `Лайк блюда: ${itemName}`, 5);
                    showToast(`❤️ Спасибо за лайк! +5 бонусов`);
                    e.target.disabled = true;
                    e.target.textContent = '✓ Лайкнут';
                });
            });
        }
        
        function renderBonus() {
            const balance = appData.bonuses[TELEGRAM_USER_ID] || 0;
            const bookingsCount = appData.bookings.filter(b => b.userId == TELEGRAM_USER_ID).length;
            const loyaltyLevel = bookingsCount >= 3 ? '🥇 Постоянный гость (кешбэк 10%)' : '⭐ Новый гость (кешбэк 5%)';
            const history = appData.bonusHistory[TELEGRAM_USER_ID] || [];
            const html = `
                <h2>🎁 Моя лояльность</h2>
                <div class="loyalty-badge">${loyaltyLevel}</div>
                <div class="bonus-balance">${balance} бонусов</div>
                <div class="card">
                    <h3>📜 История операций</h3>
                    ${history.length === 0 ? '<p>Пока нет операций</p>' : history.map(h => `<div>${h.date} — +${h.amount} (${h.reason})</div>`).join('')}
                </div>
            `;
            document.getElementById('app').innerHTML = html;
        }
        
        function renderPromo() {
            const html = `
                <h2>🔥 Акции и скидки</h2>
                ${appData.promos.map(p => `
                    <div class="promo-card">
                        <strong>${p.name}</strong> — скидка ${p.discount}%<br>
                        ${p.desc}<br>
                        <button class="copyPromoBtn" data-code="${p.code}">📋 Скопировать код: ${p.code}</button>
                    </div>
                `).join('')}
            `;
            document.getElementById('app').innerHTML = html;
            document.querySelectorAll('.copyPromoBtn').forEach(btn => {
                btn.addEventListener('click', () => {
                    navigator.clipboard.writeText(btn.dataset.code);
                    showToast(`✅ Промокод скопирован`);
                });
            });
        }
        
        function renderContacts() {
            const html = `
                <h2>📞 Контакты</h2>
                <div class="card">
                    <p>📍 ул. Тверская, д. 15, Москва</p>
                    <p>📞 <a href="tel:+74951234567">+7 (495) 123-45-67</a></p>
                    <p>🕒 Ежедневно: 12:00 – 23:00</p>
                    <button id="shareContactBtn">📱 Поделиться номером</button>
                </div>
            `;
            document.getElementById('app').innerHTML = html;
            document.getElementById('shareContactBtn')?.addEventListener('click', () => showToast(`Номер передан ресторану`));
        }
        
        // --- Роутинг ---
        let currentTab = "booking";
        async function renderCurrentTab() {
            if (currentTab === 'admin' && IS_ADMIN) await renderAdminPanel();
            else if (currentTab === 'booking') await renderBooking();
            else if (currentTab === 'menu') renderMenu();
            else if (currentTab === 'bonus') renderBonus();
            else if (currentTab === 'promo') renderPromo();
            else if (currentTab === 'contacts') renderContacts();
            else await renderBooking();
        }
        
        function setupTabs() {
            const tabBar = document.querySelector('.tab-bar');
            if (IS_ADMIN && !document.querySelector('.tab[data-tab="admin"]')) {
                const adminTab = document.createElement('button');
                adminTab.className = 'tab';
                adminTab.setAttribute('data-tab', 'admin');
                adminTab.innerHTML = '👑<span>Админ</span>';
                tabBar.appendChild(adminTab);
            }
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    currentTab = tab.dataset.tab;
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    renderCurrentTab();
                    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                });
            });
        }
        
        // --- Запуск ---
        loadBonuses();
        setupTabs();
        document.querySelector('.tab').classList.add('active');
        renderCurrentTab();
        
        console.log("👤 User ID:", TELEGRAM_USER_ID);
