<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Huqqa Restaurant – бонусы и бронирование</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding-bottom: 70px;
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            padding-top: env(safe-area-inset-top, 16px);
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 8px 8px calc(8px + env(safe-area-inset-bottom, 0px));
            border-top: 1px solid var(--tg-theme-hint-color, #ccc);
            z-index: 1000;
        }

        .tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #999);
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 12px;
        }

        .tab.active {
            color: var(--tg-theme-button-color, #31b545);
        }

        .card, .menu-item, .promo-card, .booking-item, .admin-booking {
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        button, input, select, textarea {
            font-size: 16px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            background: var(--tg-theme-bg-color, white);
            color: var(--tg-theme-text-color, black);
            width: 100%;
            margin-bottom: 12px;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            background: var(--tg-theme-button-color, #31b545);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .confirm-btn {
            background: #28a745;
            margin-right: 8px;
            width: auto;
            padding: 8px 16px;
        }

        .cancel-btn {
            background: #dc3545;
            width: auto;
            padding: 8px 16px;
        }

        .broadcast-btn {
            background: #9c27b0;
            width: auto;
            padding: 8px 16px;
            margin-bottom: 16px;
        }

        .bonus-balance {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            background: linear-gradient(135deg, gold, orange);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .loyalty-badge {
            text-align: center;
            padding: 8px;
            border-radius: 20px;
            background: var(--tg-theme-button-color, #31b545);
            color: white;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            z-index: 2000;
            animation: fadeInOut 2s ease;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        .restaurant-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .restaurant-header h1 {
            font-size: 28px;
            color: var(--tg-theme-button-color, #31b545);
        }

        .admin-panel {
            background: #ff9800;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .status-pending {
            color: #ff9800;
            font-weight: bold;
        }

        .status-confirmed {
            color: #28a745;
            font-weight: bold;
        }

        .status-expired {
            color: #999;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #999);
        }

        .refresh-btn {
            background: #2196F3;
            margin-bottom: 16px;
            width: auto;
            padding: 8px 16px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .modal-content {
            background: var(--tg-theme-bg-color, white);
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            margin-bottom: 15px;
        }

        .image-preview {
            margin: 10px 0;
            max-width: 100%;
            border-radius: 12px;
            display: none;
        }

        .image-preview img {
            max-width: 100%;
            border-radius: 12px;
        }

        .remove-image-btn {
            background: #dc3545;
            padding: 6px 12px;
            font-size: 14px;
            width: auto;
            margin-top: 5px;
        }

        .delete-mode-indicator {
            background: #2196F3;
            padding: 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 16px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading">⏳ Загрузка...</div>
    </div>

    <div class="tab-bar">
        <button class="tab" data-tab="booking">📅<span>Стол</span></button>
        <button class="tab" data-tab="menu">📖<span>Меню</span></button>
        <button class="tab" data-tab="bonus">🎁<span>Бонусы</span></button>
        <button class="tab" data-tab="promo">🔥<span>Акции</span></button>
        <button class="tab" data-tab="contacts">📞<span>Контакты</span></button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // ==================== НАСТРОЙКИ ====================
        const SHEET_API = "https://api.sheetbest.com/sheets/86b2770d-6921-43a6-ada0-a16dbd1ce54c";
        const USERS_API = "https://api.sheetbest.com/sheets/912a1d92-a006-4a4c-9085-7d6f3722e453";
        const ADMIN_IDS = [755574601];
        const BOT_TOKEN = "8696170529:AAGtVDCEntgnKdvgaEdQ44DZnnBORHjAyNM";
        // ===================================================
        
        let tg = window.Telegram?.WebApp;
        if (!tg || !tg.initDataUnsafe?.user?.id) {
            tg = {
                initDataUnsafe: { user: { id: 755574601, first_name: "Admin", username: "admin" } },
                ready: () => {},
                expand: () => {},
                close: () => {},
                HapticFeedback: { impactOccurred: () => {} },
                themeParams: { bg_color: "#ffffff", text_color: "#000000", button_color: "#31b545" }
            };
        }
        
        tg.expand();
        tg.ready();
        document.body.style.background = tg.themeParams.bg_color || '#ffffff';
        
        const TELEGRAM_USER_ID = tg.initDataUnsafe.user.id;
        const TELEGRAM_USER_NAME = tg.initDataUnsafe.user.first_name || "Гость";
        const IS_ADMIN = ADMIN_IDS.includes(TELEGRAM_USER_ID);
        
        // ========== Регистрация ==========
        let userPhone = null;
        let isRegistered = false;
        
        function loadUserData() {
            const saved = localStorage.getItem(`huqqa_user_${TELEGRAM_USER_ID}`);
            if (saved) {
                const data = JSON.parse(saved);
                userPhone = data.phone;
                isRegistered = !!userPhone;
            }
        }
        
        async function saveUserDataToCloud(phone) {
            try {
                const response = await fetch(USERS_API);
                const users = await response.json();
                const existing = users.find(u => String(u.userId) === String(TELEGRAM_USER_ID));
                
                if (!existing) {
                    const newUser = {
                        id: Date.now().toString(),
                        userId: String(TELEGRAM_USER_ID),
                        name: TELEGRAM_USER_NAME,
                        phone: phone,
                        registeredAt: new Date().toISOString()
                    };
                    await fetch(USERS_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify([newUser])
                    });
                } else if (existing.phone !== phone) {
                    await fetch(`${USERS_API}/id/${existing.id}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: phone })
                    });
                }
                
                userPhone = phone;
                isRegistered = true;
                localStorage.setItem(`huqqa_user_${TELEGRAM_USER_ID}`, JSON.stringify({
                    phone: phone,
                    registeredAt: new Date().toISOString()
                }));
                
                return true;
            } catch (error) {
                console.error("Ошибка:", error);
                return false;
            }
        }
        
        async function getBroadcastUsers() {
            try {
                const response = await fetch(USERS_API);
                return await response.json();
            } catch (error) {
                return [];
            }
        }
        
        // ========== АВТОУДАЛЕНИЕ ПРОСРОЧЕННЫХ БРОНЕЙ ==========
        // Проверяем, прошло ли 24 часа после даты и времени брони
        function isBookingExpired(booking) {
            if (!booking.date || !booking.time) return false;
            
            // Собираем дату и время брони
            const bookingDateTime = new Date(`${booking.date}T${booking.time}`);
            const now = new Date();
            
            // Вычисляем разницу в часах
            const hoursDiff = (now - bookingDateTime) / (1000 * 60 * 60);
            
            // Если прошло больше 24 часов → бронь просрочена
            return hoursDiff > 24;
        }
        
        // Удаляем все просроченные брони
        async function deleteExpiredBookings() {
            try {
                const response = await fetch(SHEET_API);
                const allBookings = await response.json();
                
                let deletedCount = 0;
                
                for (const booking of allBookings) {
                    if (isBookingExpired(booking)) {
                        // Удаляем просроченную бронь
                        await fetch(`${SHEET_API}/id/${booking.id}`, {
                            method: 'DELETE'
                        });
                        deletedCount++;
                        console.log(`🗑️ Удалена просроченная бронь #${booking.id} (${booking.date} ${booking.time})`);
                    }
                }
                
                if (deletedCount > 0) {
                    console.log(`✅ Удалено просроченных броней: ${deletedCount}`);
                }
                
                return deletedCount;
            } catch (error) {
                console.error("Ошибка при удалении просроченных броней:", error);
                return 0;
            }
        }
        
        // ========== РАССЫЛКА ==========
        async function sendPhotoMessage(chatId, caption, imageFile) {
            try {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', imageFile);
                formData.append('caption', `📢 *НОВОСТЬ ОТ РЕСТОРАНА HUQQA*\n\n${caption}\n\n— Администрация Huqqa`);
                formData.append('parse_mode', 'Markdown');
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                return response.ok;
            } catch (error) {
                return false;
            }
        }
        
        async function sendTextMessage(chatId, text) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: `📢 *НОВОСТЬ ОТ РЕСТОРАНА HUQQA*\n\n${text}\n\n— Администрация Huqqa`,
                        parse_mode: 'Markdown'
                    })
                });
                return response.ok;
            } catch (error) {
                return false;
            }
        }
        
        async function sendBroadcast(message, imageFile = null) {
            const users = await getBroadcastUsers();
            if (users.length === 0) {
                showToast("❌ Нет зарегистрированных пользователей", true);
                return { success: false, count: 0 };
            }
            
            let successCount = 0;
            let failCount = 0;
            
            showToast(`📢 Начинаю рассылку ${users.length} пользователям...`);
            
            for (const user of users) {
                let sent = false;
                if (imageFile) {
                    sent = await sendPhotoMessage(user.userId, message, imageFile);
                } else {
                    sent = await sendTextMessage(user.userId, message);
                }
                
                if (sent) {
                    successCount++;
                } else {
                    failCount++;
                }
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            
            showToast(`✅ Рассылка завершена! Отправлено: ${successCount}, ошибок: ${failCount}`);
            return { success: true, count: successCount };
        }
        
        function showBroadcastModal() {
            getBroadcastUsers().then(users => {
                let selectedImage = null;
                
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3>📢 Сделать рассылку</h3>
                        <p>👥 Пользователей в базе: ${users.length}</p>
                        <textarea id="broadcastMessage" placeholder="Введите текст сообщения..." rows="4"></textarea>
                        <input type="file" id="broadcastImage" accept="image/jpeg,image/png,image/gif,image/webp">
                        <div id="imagePreviewContainer" style="display:none;">
                            <img id="imagePreview" class="image-preview" style="max-width:100%; border-radius:12px;">
                            <button id="removeImageBtn" class="remove-image-btn">🗑 Удалить фото</button>
                        </div>
                        <div class="button-group">
                            <button id="sendBroadcastBtn" style="background:#9c27b0;">📤 Отправить</button>
                            <button id="closeModalBtn" style="background:#666;">Отмена</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                
                const messageInput = document.getElementById('broadcastMessage');
                const imageInput = document.getElementById('broadcastImage');
                const previewContainer = document.getElementById('imagePreviewContainer');
                const previewImg = document.getElementById('imagePreview');
                
                imageInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        selectedImage = file;
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            previewImg.src = event.target.result;
                            previewContainer.style.display = 'block';
                        };
                        reader.readAsDataURL(file);
                    }
                });
                
                document.getElementById('removeImageBtn')?.addEventListener('click', () => {
                    selectedImage = null;
                    imageInput.value = '';
                    previewContainer.style.display = 'none';
                    previewImg.src = '';
                });
                
                document.getElementById('sendBroadcastBtn')?.addEventListener('click', async () => {
                    const message = messageInput.value.trim();
                    if (!message) {
                        showToast("Введите текст сообщения", true);
                        return;
                    }
                    
                    const sendBtn = document.getElementById('sendBroadcastBtn');
                    const originalText = sendBtn.textContent;
                    sendBtn.textContent = "⏳ Отправка...";
                    sendBtn.disabled = true;
                    
                    await sendBroadcast(message, selectedImage);
                    
                    sendBtn.textContent = originalText;
                    sendBtn.disabled = false;
                    modal.remove();
                });
                
                document.getElementById('closeModalBtn')?.addEventListener('click', () => {
                    modal.remove();
                });
            });
        }
        
        // ========== Данные приложения ==========
        let bookings = [];
        
        const menu = [
            { id: 1, name: "🥗 Цезарь с креветками", desc: "Салат, креветки, пармезан", price: 590, category: "Салаты" },
            { id: 2, name: "🍲 Борщ с пампушками", desc: "Классический украинский борщ", price: 390, category: "Супы" },
            { id: 3, name: "🥩 Рибай стейк", desc: "Мраморная говядина", price: 1890, category: "Горячее" },
            { id: 4, name: "🍕 Маргарита", desc: "Томатный соус, моцарелла", price: 650, category: "Пицца" },
            { id: 5, name: "🍣 Филадельфия", desc: "Лосось, сливочный сыр", price: 750, category: "Роллы" },
            { id: 6, name: "🥤 Домашний лимонад", desc: "Имбирь, мята, лайм", price: 250, category: "Напитки" }
        ];
        
        const promos = [
            { id: 1, name: "🎉 Welcome бонус", desc: "Скидка 20% на первый заказ", discount: 20, code: "WELCOME20" },
            { id: 2, name: "🍺 Счастливый час", desc: "Скидка 15% с 15:00 до 17:00", discount: 15, code: "HAPPY15" },
            { id: 3, name: "🎂 День рождения", desc: "Именинникам скидка 25%", discount: 25, code: "BIRTHDAY25" }
        ];
        
        let userBonuses = { balance: 100, history: [] };
        
        function loadBonuses() {
            const saved = localStorage.getItem(`huqqa_bonuses_${TELEGRAM_USER_ID}`);
            if (saved) {
                userBonuses = JSON.parse(saved);
            } else {
                userBonuses = { balance: 100, history: [{ date: new Date().toLocaleString(), reason: "Регистрация", amount: 100 }] };
                saveBonuses();
            }
        }
        
        function saveBonuses() {
            localStorage.setItem(`huqqa_bonuses_${TELEGRAM_USER_ID}`, JSON.stringify(userBonuses));
        }
        
        function addBonus(reason, amount) {
            userBonuses.balance += amount;
            userBonuses.history.unshift({ date: new Date().toLocaleString(), reason: reason, amount: amount });
            if (userBonuses.history.length > 10) userBonuses.history.pop();
            saveBonuses();
        }
        
        async function loadBookings() {
            try {
                const response = await fetch(SHEET_API);
                if (!response.ok) throw new Error('Ошибка загрузки');
                const data = await response.json();
                bookings = data;
                return bookings;
            } catch (error) {
                bookings = [];
                return [];
            }
        }
        
        async function saveBooking(booking) {
            try {
                booking.id = Date.now().toString();
                booking.created_at = new Date().toISOString();
                booking.phone = userPhone || booking.phone;
                
                const response = await fetch(SHEET_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify([booking])
                });
                if (!response.ok) throw new Error('Ошибка сохранения');
                return booking;
            } catch (error) {
                showToast("Ошибка сохранения!", true);
                return null;
            }
        }
        
        async function updateBooking(bookingId, updatedData) {
            try {
                const response = await fetch(`${SHEET_API}/id/${bookingId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                });
                if (!response.ok) throw new Error('Ошибка обновления');
                return true;
            } catch (error) {
                return false;
            }
        }
        
        async function deleteBooking(bookingId) {
            try {
                const response = await fetch(`${SHEET_API}/id/${bookingId}`, {
                    method: 'DELETE'
                });
                if (!response.ok) throw new Error('Ошибка удаления');
                return true;
            } catch (error) {
                return false;
            }
        }
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.style.background = isError ? 'rgba(220, 50, 50, 0.95)' : 'rgba(0,0,0,0.85)';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        // ========== Админ-панель (с автоудалением) ==========
        async function renderAdminPanel() {
            // Сначала удаляем все просроченные брони
            const deleted = await deleteExpiredBookings();
            if (deleted > 0) {
                showToast(`🗑️ Удалено ${deleted} просроченных броней (старше 24 часов)`);
            }
            
            await loadBookings();
            const users = await getBroadcastUsers();
            
            // Фильтруем брони (показываем только непросроченные)
            const activeBookings = bookings.filter(b => !isBookingExpired(b));
            const pendingBookings = activeBookings.filter(b => b.status === 'pending');
            const confirmedBookings = activeBookings.filter(b => b.status === 'confirmed');
            
            let html = `
                <div class="restaurant-header">
                    <h1>👑 Админ-панель</h1>
                    <div class="admin-panel">Вы вошли как администратор | ID: ${TELEGRAM_USER_ID}</div>
                    <div class="delete-mode-indicator">
                        🗑️ Брони удаляются автоматически через 24 часа после времени брони
                    </div>
                    <div class="button-group">
                        <button class="refresh-btn" id="refreshBtn">🔄 Обновить</button>
                        <button class="broadcast-btn" id="broadcastBtn">📢 Сделать рассылку (текст + фото)</button>
                    </div>
                    <p style="font-size:12px; margin-top:5px;">👥 Зарегистрировано: ${users.length} | 📊 Активных броней: ${activeBookings.length}</p>
                </div>
            `;
            
            html += `<h2>⏳ Ожидают подтверждения (${pendingBookings.length})</h2>`;
            if (pendingBookings.length === 0) {
                html += `<p>✨ Нет новых броней</p>`;
            } else {
                pendingBookings.forEach(b => {
                    // Показываем, через сколько удалится
                    const bookingDateTime = new Date(`${b.date}T${b.time}`);
                    const deleteDateTime = new Date(bookingDateTime.getTime() + 24 * 60 * 60 * 1000);
                    const deleteTimeStr = deleteDateTime.toLocaleString();
                    
                    html += `
                        <div class="admin-booking" data-id="${b.id}">
                            <strong>👤 ${b.name || 'Не указано'}</strong><br>
                            📞 ${b.phone || 'Не указан'}<br>
                            📅 ${b.date || '?'} в ${b.time || '?'}<br>
                            👥 ${b.guests || 1} гостей<br>
                            🆔 TG ID: ${b.userId || '?'}<br>
                            <span class="status-pending">⏳ Статус: Ожидает</span><br>
                            <small>🗑️ Удалится: ${deleteTimeStr}</small>
                            <div class="button-group">
                                <button class="confirm-btn" data-id="${b.id}">✅ Подтвердить</button>
                                <button class="cancel-btn" data-id="${b.id}">❌ Отменить</button>
                            </div>
                        </div>
                    `;
                });
            }
            
            html += `<h2>✅ Подтверждённые брони (${confirmedBookings.length})</h2>`;
            if (confirmedBookings.length === 0) {
                html += `<p>Нет подтверждённых броней</p>`;
            } else {
                confirmedBookings.forEach(b => {
                    const bookingDateTime = new Date(`${b.date}T${b.time}`);
                    const deleteDateTime = new Date(bookingDateTime.getTime() + 24 * 60 * 60 * 1000);
                    const deleteTimeStr = deleteDateTime.toLocaleString();
                    
                    html += `
                        <div class="admin-booking">
                            <strong>👤 ${b.name}</strong><br>
                            📞 ${b.phone}<br>
                            📅 ${b.date} в ${b.time}<br>
                            👥 ${b.guests} гостей<br>
                            <span class="status-confirmed">✅ Статус: Подтверждено</span><br>
                            <small>🗑️ Удалится: ${deleteTimeStr}</small>
                        </div>
                    `;
                });
            }
            
            document.getElementById('app').innerHTML = html;
            
            document.getElementById('refreshBtn')?.addEventListener('click', () => renderAdminPanel());
            document.getElementById('broadcastBtn')?.addEventListener('click', () => showBroadcastModal());
            
            document.querySelectorAll('.confirm-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const bookingId = btn.dataset.id;
                    await updateBooking(bookingId, { status: 'confirmed' });
                    showToast(`✅ Бронь подтверждена!`);
                    renderAdminPanel();
                });
            });
            
            document.querySelectorAll('.cancel-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const bookingId = btn.dataset.id;
                    await deleteBooking(bookingId);
                    showToast(`❌ Бронь удалена`);
                    renderAdminPanel();
                });
            });
        }
        
        // ========== Бронирование (пользователь не видит просроченные брони) ==========
        async function renderBooking() {
            await loadBookings();
            // Показываем только активные (непросроченные) брони пользователя
            const myActiveBookings = bookings.filter(b => 
                String(b.userId) === String(TELEGRAM_USER_ID) && !isBookingExpired(b)
            );
            
            const html = `
                <div class="restaurant-header">
                    <h1>🍽️ Huqqa Restaurant</h1>
                    <p>Забронируй стол и получи +50 бонусов</p>
                    ${userPhone ? `<p style="font-size:12px">📱 Ваш номер: ${userPhone}</p>` : ''}
                </div>
                <div class="card">
                    <input type="text" id="name" placeholder="Ваше имя" value="${TELEGRAM_USER_NAME}">
                    <input type="tel" id="phone" placeholder="Телефон" value="${userPhone || ''}" ${userPhone ? 'readonly' : ''}>
                    <input type="date" id="date" min="${new Date().toISOString().split('T')[0]}">
                    <input type="time" id="time">
                    <input type="number" id="guests" placeholder="Кол-во гостей" min="1" max="10" value="2">
                    <button id="submitBookingBtn">✅ Забронировать (+50 бонусов)</button>
                </div>
                <h3>📋 Мои активные бронирования</h3>
                ${myActiveBookings.length === 0 ? '<p>У вас нет активных броней (старые автоматически удаляются через 24 часа)</p>' : 
                    myActiveBookings.map(b => `
                        <div class="booking-item">
                            <strong>${b.date} в ${b.time}</strong><br>
                            Гостей: ${b.guests} | Статус: ${b.status === 'pending' ? '<span class="status-pending">⏳ Ожидает</span>' : '<span class="status-confirmed">✅ Подтверждено</span>'}
                        </div>
                    `).join('')
                }
            `;
            document.getElementById('app').innerHTML = html;
            
            document.getElementById('submitBookingBtn')?.addEventListener('click', async () => {
                const phone = document.getElementById('phone').value;
                const date = document.getElementById('date').value;
                const time = document.getElementById('time').value;
                const guests = parseInt(document.getElementById('guests').value);
                
                if (!phone || !date || !time) {
                    showToast('Заполните телефон, дату и время', true);
                    return;
                }
                
                const newBooking = {
                    userId: String(TELEGRAM_USER_ID),
                    name: TELEGRAM_USER_NAME,
                    phone: phone,
                    date: date,
                    time: time,
                    guests: guests,
                    status: 'pending'
                };
                
                const saved = await saveBooking(newBooking);
                if (saved) {
                    addBonus(`Бронь стола на ${date} ${time}`, 50);
                    showToast(`✅ Стол забронирован! +50 бонусов`);
                    setTimeout(() => renderBooking(), 1000);
                }
            });
        }
        
        function renderMenu() {
            const categories = [...new Set(menu.map(item => item.category))];
            let html = `<h2>📖 Наше меню</h2>`;
            categories.forEach(cat => {
                html += `<h3>${cat}</h3>`;
                const items = menu.filter(item => item.category === cat);
                items.forEach(item => {
                    html += `
                        <div class="menu-item">
                            <strong>${item.name}</strong> — ${item.price} ₽<br>
                            <small>${item.desc}</small><br>
                            <button class="likeBtn" data-name="${item.name}">❤️ Лайк (+5 бонусов)</button>
                        </div>
                    `;
                });
            });
            document.getElementById('app').innerHTML = html;
            document.querySelectorAll('.likeBtn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    addBonus(`Лайк блюда: ${e.target.dataset.name}`, 5);
                    showToast(`❤️ +5 бонусов!`);
                    e.target.disabled = true;
                    e.target.textContent = '✓ Лайкнут';
                });
            });
        }
        
        function renderBonus() {
            const bookingsCount = bookings.filter(b => String(b.userId) === String(TELEGRAM_USER_ID) && !isBookingExpired(b)).length;
            const loyaltyLevel = bookingsCount >= 3 ? '🥇 Постоянный гость (кешбэк 10%)' : '⭐ Новый гость (кешбэк 5%)';
            const html = `
                <h2>🎁 Моя лояльность</h2>
                <div class="loyalty-badge">${loyaltyLevel}</div>
                <div class="bonus-balance">${userBonuses.balance} бонусов</div>
                <div class="card">
                    <h3>📜 История операций</h3>
                    ${userBonuses.history.length === 0 ? '<p>Пока нет операций</p>' : 
                        userBonuses.history.map(h => `<div>${h.date} — +${h.amount} (${h.reason})</div>`).join('')}
                </div>
                <div class="card">
                    <h3>💰 Как потратить бонусы?</h3>
                    <p>100 бонусов = 50₽ скидка</p>
                    <p><small>📌 Активные брони: ${bookingsCount}</small></p>
                </div>
            `;
            document.getElementById('app').innerHTML = html;
        }
        
        function renderPromo() {
            const html = `
                <h2>🔥 Акции и скидки</h2>
                ${promos.map(p => `
                    <div class="promo-card">
                        <strong>${p.name}</strong> — скидка ${p.discount}%<br>
                        ${p.desc}<br>
                        <button class="copyPromoBtn" data-code="${p.code}">📋 Скопировать код: ${p.code}</button>
                    </div>
                `).join('')}
            `;
            document.getElementById('app').innerHTML = html;
            document.querySelectorAll('.copyPromoBtn').forEach(btn => {
                btn.addEventListener('click', () => {
                    navigator.clipboard.writeText(btn.dataset.code);
                    showToast(`✅ Промокод скопирован`);
                });
            });
        }
        
        function renderContacts() {
            const html = `
                <h2>📞 Контакты</h2>
                <div class="card">
                    <p>📍 ул. Тверская, д. 15, Москва</p>
                    <p>📞 <a href="tel:+74951234567">+7 (495) 123-45-67</a></p>
                    <p>🕒 Ежедневно: 12:00 – 23:00</p>
                    <button id="shareContactBtn">📱 Поделиться номером</button>
                </div>
                <iframe width="100%" height="250" frameborder="0" style="border-radius:16px" 
                    src="https://yandex.ru/map-widget/v1/?ll=37.617698,55.755864&z=15"></iframe>
            `;
            document.getElementById('app').innerHTML = html;
            document.getElementById('shareContactBtn')?.addEventListener('click', () => showToast(`Номер передан ресторану`));
        }
        
        let currentTab = "booking";
        
        async function renderCurrentTab() {
            if (!isRegistered) {
                await showPhoneRegistrationModal();
                renderCurrentTab();
                return;
            }
            
            if (currentTab === 'admin' && IS_ADMIN) await renderAdminPanel();
            else if (currentTab === 'booking') await renderBooking();
            else if (currentTab === 'menu') renderMenu();
            else if (currentTab === 'bonus') renderBonus();
            else if (currentTab === 'promo') renderPromo();
            else if (currentTab === 'contacts') renderContacts();
            else await renderBooking();
        }
        
        function showPhoneRegistrationModal() {
            return new Promise((resolve) => {
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3>📱 Добро пожаловать!</h3>
                        <p>Пожалуйста, укажите ваш номер телефона для получения бонусов и уведомлений.</p>
                        <input type="tel" id="phoneInput" placeholder="+7 (XXX) XXX-XX-XX">
                        <div class="button-group">
                            <button id="savePhoneBtn">✅ Сохранить</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                
                document.getElementById('savePhoneBtn')?.addEventListener('click', async () => {
                    const phone = document.getElementById('phoneInput').value.trim();
                    if (phone) {
                        await saveUserDataToCloud(phone);
                        modal.remove();
                        resolve(true);
                    } else {
                        showToast("Введите номер телефона", true);
                    }
                });
            });
        }
        
        function setupTabs() {
            const tabBar = document.querySelector('.tab-bar');
            if (IS_ADMIN && !document.querySelector('.tab[data-tab="admin"]')) {
                const adminTab = document.createElement('button');
                adminTab.className = 'tab';
                adminTab.setAttribute('data-tab', 'admin');
                adminTab.innerHTML = '👑<span>Админ</span>';
                tabBar.appendChild(adminTab);
            }
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    currentTab = tab.dataset.tab;
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    renderCurrentTab();
                });
            });
        }
        
        loadUserData();
        loadBonuses();
        setupTabs();
        document.querySelector('.tab').classList.add('active');
        renderCurrentTab();
        
        // Запускаем автоудаление каждые 5 минут (проверка просроченных броней)
        setInterval(async () => {
            if (IS_ADMIN) {
                const deleted = await deleteExpiredBookings();
                if (deleted > 0 && currentTab === 'admin') {
                    renderAdminPanel();
                }
            }
        }, 5 * 60 * 1000); // каждые 5 минут
        
        console.log("👤 User ID:", TELEGRAM_USER_ID);
        console.log("👑 Is Admin:", IS_ADMIN);
        console.log("🗑️ Автоудаление броней: через 24 часа после времени брони");
    </script>
</body>
</html>
