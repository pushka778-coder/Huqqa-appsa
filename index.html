<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Huqqa Lounge – бронирование столов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding-bottom: 70px;
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            padding-top: env(safe-area-inset-top, 16px);
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 8px 8px calc(8px + env(safe-area-inset-bottom, 0px));
            border-top: 1px solid var(--tg-theme-hint-color, #ccc);
            z-index: 1000;
        }

        .tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #999);
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 12px;
        }

        .tab.active {
            color: var(--tg-theme-button-color, #31b545);
        }

        .card, .menu-item, .promo-card, .booking-item, .admin-booking {
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        button, input, select, textarea {
            font-size: 16px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            background: var(--tg-theme-bg-color, white);
            color: var(--tg-theme-text-color, black);
            width: 100%;
            margin-bottom: 12px;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            background: var(--tg-theme-button-color, #31b545);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .confirm-btn {
            background: #28a745;
            margin-right: 8px;
            width: auto;
            padding: 8px 16px;
        }

        .cancel-btn {
            background: #dc3545;
            width: auto;
            padding: 8px 16px;
        }

        .edit-btn {
            background: #2196F3;
            width: auto;
            padding: 8px 16px;
            margin-right: 8px;
        }

        .broadcast-btn {
            background: #9c27b0;
            width: auto;
            padding: 8px 16px;
            margin-bottom: 16px;
        }

        .bonus-balance {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            background: linear-gradient(135deg, gold, orange);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .loyalty-badge {
            text-align: center;
            padding: 8px;
            border-radius: 20px;
            background: var(--tg-theme-button-color, #31b545);
            color: white;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            z-index: 2000;
            animation: fadeInOut 2s ease;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        .restaurant-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .restaurant-header h1 {
            font-size: 28px;
            color: var(--tg-theme-button-color, #31b545);
        }

        .admin-panel {
            background: #ff9800;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .status-pending {
            color: #ff9800;
            font-weight: bold;
        }

        .status-confirmed {
            color: #28a745;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #999);
        }

        .refresh-btn {
            background: #2196F3;
            margin-bottom: 16px;
            width: auto;
            padding: 8px 16px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .modal-content {
            background: var(--tg-theme-bg-color, white);
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            margin-bottom: 15px;
        }

        .image-preview {
            margin: 10px 0;
            max-width: 100%;
            border-radius: 12px;
            display: none;
        }

        .image-preview img {
            max-width: 100%;
            border-radius: 12px;
        }

        .remove-image-btn {
            background: #dc3545;
            padding: 6px 12px;
            font-size: 14px;
            width: auto;
            margin-top: 5px;
        }

        .delete-mode-indicator {
            background: #2196F3;
            padding: 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 16px;
            text-align: center;
        }

        .edit-input {
            margin-bottom: 10px;
        }

        .edit-input label {
            display: block;
            font-size: 12px;
            margin-bottom: 4px;
            color: var(--tg-theme-hint-color, #666);
        }

        .menu-category {
            font-size: 18px;
            font-weight: bold;
            margin: 20px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--tg-theme-button-color, #31b545);
        }

        .menu-subcategory {
            font-size: 14px;
            font-weight: bold;
            margin: 15px 0 8px 0;
            color: var(--tg-theme-hint-color, #666);
        }
    </style>
</head>
<body>

            tg = {
                initDataUnsafe: { user: { id: 755574601, first_name: "Admin", username: "admin" } },

        const TELEGRAM_USER_ID = tg.initDataUnsafe.user.id;

        const IS_ADMIN = ADMIN_IDS.includes(TELEGRAM_USER_ID);
        
        // ========== Регистрация ==========
        let userPhone = null;
        let isRegistered = false;
        
        function loadUserData() {
            const saved = localStorage.getItem(`huqqa_user_${TELEGRAM_USER_ID}`);
            if (saved) {
                const data = JSON.parse(saved);
                userPhone = data.phone;
                isRegistered = !!userPhone;
            }
        }
        
        async function saveUserDataToCloud(phone) {
            try {
                const response = await fetch(USERS_API);
                const users = await response.json();
                const existing = users.find(u => String(u.userId) === String(TELEGRAM_USER_ID));
                
                if (!existing) {
                    const newUser = {
                        id: Date.now().toString(),
                        userId: String(TELEGRAM_USER_ID),
                        name: TELEGRAM_USER_NAME,
                        phone: phone,
                        registeredAt: new Date().toISOString()
                    };
                    await fetch(USERS_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify([newUser])
                    });
                } else if (existing.phone !== phone) {
                    await fetch(`${USERS_API}/id/${existing.id}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: phone })
                    });
                }
                
                userPhone = phone;
                isRegistered = true;
                localStorage.setItem(`huqqa_user_${TELEGRAM_USER_ID}`, JSON.stringify({
                    phone: phone,
                    registeredAt: new Date().toISOString()
                }));
                
                return true;
            } catch (error) {
                console.error("Ошибка:", error);
                return false;
            }
        }
        
        async function getBroadcastUsers() {
            try {
                const response = await fetch(USERS_API);
                return await response.json();
            } catch (error) {
                return [];
            }
        }
        
        // ========== АВТОУДАЛЕНИЕ ПРОСРОЧЕННЫХ БРОНЕЙ ==========
        function isBookingExpired(booking) {
            if (!booking.date || !booking.time) return false;
            const bookingDateTime = new Date(`${booking.date}T${booking.time}`);
            const now = new Date();
            const hoursDiff = (now - bookingDateTime) / (1000 * 60 * 60);
            return hoursDiff > 24;
        }
        
        async function deleteExpiredBookings() {
            try {
                const response = await fetch(SHEET_API);
                const allBookings = await response.json();
                let deletedCount = 0;
                for (const booking of allBookings) {
                    if (isBookingExpired(booking)) {
                        await fetch(`${SHEET_API}/id/${booking.id}`, { method: 'DELETE' });
                        deletedCount++;
                    }
                }
                return deletedCount;
            } catch (error) {
                return 0;
            }
        }
        
        // ========== ОТПРАВКА УВЕДОМЛЕНИЯ АДМИНИСТРАТОРУ ==========
        async function sendNotificationToAdmins(booking) {
            const adminIds = ADMIN_IDS;
            const message = `🆕 *НОВАЯ БРОНЬ В HUQQA LOUNGE!*\n\n` +
                `👤 *Имя:* ${booking.name}\n` +
                `📞 *Телефон:* ${booking.phone}\n` +
                `📅 *Дата:* ${booking.date}\n` +
                `⏰ *Время:* ${booking.time}\n` +
                `👥 *Гостей:* ${booking.guests}\n` +
                `🆔 *TG ID:* ${booking.userId}\n\n` +
                `_Для подтверждения зайдите в админ-панель_`;
            
            let successCount = 0;
            for (const adminId of adminIds) {
                try {
                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: adminId,
                            text: message,
                            parse_mode: 'Markdown'
                        })
                    });
                    if (response.ok) successCount++;
                } catch (error) {
                    console.error("Ошибка отправки уведомления админу:", error);
                }
            }
            return successCount;
        }
        
        // ========== РЕДАКТИРОВАНИЕ БРОНИ ==========
        function showEditBookingModal(booking) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>✏️ Редактировать бронь</h3>
                    <div class="edit-input">
                        <label>👤 Имя</label>
                        <input type="text" id="editName" value="${booking.name || ''}">
                    </div>
                    <div class="edit-input">
                        <label>📞 Телефон</label>
                        <input type="tel" id="editPhone" value="${booking.phone || ''}">
                    </div>
                    <div class="edit-input">
                        <label>📅 Дата</label>
                        <input type="date" id="editDate" value="${booking.date || ''}" min="${new Date().toISOString().split('T')[0]}">
                    </div>
                    <div class="edit-input">
                        <label>⏰ Время</label>
                        <input type="time" id="editTime" value="${booking.time || ''}">
                    </div>
                    <div class="edit-input">
                        <label>👥 Количество гостей</label>
                        <input type="number" id="editGuests" value="${booking.guests || 2}" min="1" max="20">

            document.body.appendChild(modal);
            
            document.getElementById('saveEditBtn')?.addEventListener('click', async () => {
                const updatedBooking = {
                    ...booking,
                    name: document.getElementById('editName').value,
                    phone: document.getElementById('editPhone').value,
                    date: document.getElementById('editDate').value,
                    time: document.getElementById('editTime').value,
                    guests: parseInt(document.getElementById('editGuests').value),
                    status: document.getElementById('editStatus').value
                };
                
                if (!updatedBooking.phone || !updatedBooking.date || !updatedBooking.time) {
                    showToast("Заполните телефон, дату и время", true);
                    return;
                }
                
                await updateBooking(booking.id, updatedBooking);
                showToast(`✅ Бронь #${booking.id.substring(0,8)} обновлена!`);
                modal.remove();
                renderAdminPanel();
            });
            
            document.getElementById('closeEditBtn')?.addEventListener('click', () => {
                modal.remove();
            });
        }
        
        // ========== РАССЫЛКА ==========
        async function sendPhotoMessage(chatId, caption, imageFile) {
            try {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', imageFile);
                formData.append('caption', `📢 *НОВОСТЬ ОТ HUQQA LOUNGE*\n\n${caption}\n\n— Администрация Huqqa Lounge`);
                formData.append('parse_mode', 'Markdown');
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                return response.ok;
            } catch (error) {
                return false;
            }
        }
        
        async function sendTextMessage(chatId, text) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: `📢 *НОВОСТЬ ОТ HUQQA LOUNGE*\n\n${text}\n\n— Администрация Huqqa Lounge`,
                        parse_mode: 'Markdown'
                    })
                });
                return response.ok;
            } catch (error) {
                return false;
            }
        }
        
        async function sendBroadcast(message, imageFile = null) {
            const users = await getBroadcastUsers();
            if (users.length === 0) {
                showToast("❌ Нет зарегистрированных пользователей", true);
                return { success: false, count: 0 };
            }
            let successCount = 0;
            let failCount = 0;
            showToast(`📢 Начинаю рассылку ${users.length} пользователям...`);
            for (const user of users) {
                let sent = false;
                if (imageFile) {
                    sent = await sendPhotoMessage(user.userId, message, imageFile);
                } else {
                    sent = await sendTextMessage(user.userId, message);
                }
                if (sent) successCount++;
                else failCount++;
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            showToast(`✅ Рассылка завершена! Отправлено: ${successCount}, ошибок: ${failCount}`);
            return { success: true, count: successCount };
        }
        
        function showBroadcastModal() {
            getBroadcastUsers().then(users => {
                let selectedImage = null;
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3>📢 Сделать рассылку</h3>
                        <p>👥 Пользователей в базе: ${users.length}</p>
                        <textarea id="broadcastMessage" placeholder="Введите текст сообщения..." rows="4"></textarea>
                        <input type="file" id="broadcastImage" accept="image/jpeg,image/png,image/gif,image/webp">
                        <div id="imagePreviewContainer" style="display:none;">
                            <img id="imagePreview" class="image-preview" style="max-width:100%; border-radius:12px;">
                            <button id="removeImageBtn" class="remove-image-btn">🗑 Удалить фото</button>
                        </div>
                        <div class="button-group">
                            <button id="sendBroadcastBtn" style="background:#9c27b0;">📤 Отправить</button>
                            <button id="closeModalBtn" style="background:#666;">Отмена</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                const messageInput = document.getElementById('broadcastMessage');
                const imageInput = document.getElementById('broadcastImage');
                const previewContainer = document.getElementById('imagePreviewContainer');
                const previewImg = document.getElementById('imagePreview');
                imageInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        selectedImage = file;
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            previewImg.src = event.target.result;
                            previewContainer.style.display = 'block';
                        };
                        reader.readAsDataURL(file);
                    }
                });
                document.getElementById('removeImageBtn')?.addEventListener('click', () => {
                    selectedImage = null;
                    imageInput.value = '';
                    previewContainer.style.display = 'none';
                    previewImg.src = '';
                });
                document.getElementById('sendBroadcastBtn')?.addEventListener('click', async () => {
                    const message = messageInput.value.trim();
                    if (!message) {
                        showToast("Введите текст сообщения", true);
                        return;
                    }
                    const sendBtn = document.getElementById('sendBroadcastBtn');
                    const originalText = sendBtn.textContent;
                    sendBtn.textContent = "⏳ Отправка...";
                    sendBtn.disabled = true;
                    await sendBroadcast(message, selectedImage);
                    sendBtn.textContent = originalText;
                    sendBtn.disabled = false;
                    modal.remove();
                });
                document.getElementById('closeModalBtn')?.addEventListener('click', () => { modal.remove(); });
            });
        }
