name: 🎂 Birthday Checker

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  check-birthdays:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 🎂 Run birthday checker
        run: node birthdayChecker.js
